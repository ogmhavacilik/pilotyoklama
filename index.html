                                                        <button onClick={(e) => { e.stopPropagation(); initiateDeletePerson(p); }} type="button" className="text-red-400 ml-2 hover:bg-forest-800 rounded p-1 relative z-10"><Trash2 size={16} /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <Card title="Harcırah Oluşturma">
                                <div className="space-y-4">
                                    <div className="flex items-center gap-4">
                                        <Button onClick={() => setHarcirahStep('started')}>Harcırah Oluştur</Button>
                                        {harcirahStep !== 'initial' && (
                                            <span className="text-forest-400 text-sm">
                                                Seçili İl: <span className="text-white font-bold">{selectedHarcirahCity}</span>
                                                {selectedHarcirahUnit && <> | Birim: <span className="text-white font-bold">{selectedHarcirahUnit}</span></>}
                                            </span>
                                        )}
                                    </div>

                                    {harcirahStep !== 'initial' && (
                                        <div className="grid md:grid-cols-2 gap-6 pt-4 border-t border-forest-700">
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-forest-400 uppercase">1. Görev İli Seçiniz</label>
                                                <div className="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto pr-2">
                                                    {availableHarcirahCities.length > 0 ? (
                                                        availableHarcirahCities.map(city => (
                                                            <button 
                                                                key={city} 
                                                                onClick={() => handleHarcirahCitySelect(city)}
                                                                className={`p-2 text-sm rounded border ${selectedHarcirahCity === city ? 'bg-forest-500 border-forest-400 text-white' : 'bg-forest-950 border-forest-700 text-forest-300 hover:border-forest-500'}`}
                                                            >
                                                                {city}
                                                            </button>
                                                        ))
                                                    ) : (
                                                        <div className="col-span-2 text-forest-500 text-xs italic p-4 text-center bg-forest-950/50 rounded border border-forest-800">
                                                            Yoklama kayıtlarında görev yeri girilmiş personel bulunamadı.
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {selectedHarcirahCity && (
                                                <div className="space-y-2 animate-slide-down">
                                                    <label className="text-xs font-bold text-forest-400 uppercase">2. Birim Seçiniz</label>
                                                    <div className="space-y-2">
                                                        {['AT-802', 'T-70', 'C-650', 'B-360', 'BELL-429', 'İDARİ BİRİM'].map(cat => (
                                                            <button 
                                                                key={cat} 
                                                                onClick={() => handleHarcirahUnitSelect(cat)}
                                                                className={`w-full p-2 text-left text-sm rounded border ${selectedHarcirahUnit === cat ? 'bg-forest-500 border-forest-400 text-white' : 'bg-forest-950 border-forest-700 text-forest-300 hover:border-forest-500'}`}
                                                            >
                                                                {cat}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {harcirahStep === 'unit_selected' && (
                                        <div className="pt-6 border-t border-forest-700 animate-slide-down">
                                            <label className="text-xs font-bold text-forest-400 uppercase block mb-2">3. Görev Tarih Aralığı Seçiniz</label>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
                                                {availableHarcirahRanges.length > 0 ? (
                                                    availableHarcirahRanges.map((range, idx) => {
                                                        const d1 = new Date(range.start); d1.setHours(12,0,0,0);
                                                        const d2 = new Date(range.end); d2.setHours(12,0,0,0);
                                                        const rawDiffDays = Math.round((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
                                                        
                                                        let hStart = new Date(d1);
                                                        let hEnd = new Date(d2);
                                                        if (rawDiffDays >= 7) {
                                                            hStart.setDate(hStart.getDate() + 1);
                                                        }

                                                        const startStr = hStart.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
                                                        const endStr = hEnd.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
                                                        const displayDays = rawDiffDays >= 7 ? rawDiffDays - 1 : rawDiffDays;

                                                        return (
                                                            <div key={idx} className="relative group">
                                                                <button 
                                                                    onClick={() => handleHarcirahRangeSelect(range)}
                                                                    className={`w-full p-3 text-sm rounded border text-left flex flex-col pr-12 ${selectedHarcirahRange?.start === range.start ? 'bg-forest-500 border-forest-400 text-white' : 'bg-forest-950 border-forest-700 text-forest-300 hover:border-forest-500'}`}
                                                                >
                                                                    <div className="flex justify-between items-center w-full">
                                                                        <span className="font-bold">{startStr}</span>
                                                                        <span className="text-[10px] bg-forest-800 px-1.5 py-0.5 rounded text-forest-200">{displayDays} GÜN</span>
                                                                    </div>
                                                                    <span className="text-[10px] opacity-70">- {endStr}</span>
                                                                </button>
                                                                <button 
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        setFullAttendanceParams({ 
                                                                            model: selectedHarcirahUnit, 
                                                                            start: range.start, 
                                                                            end: range.end 
                                                                        });
                                                                        setShowFullAttendanceModal(true);
                                                                    }}
                                                                    className="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-orange-600 hover:bg-orange-500 text-white rounded text-[10px] uppercase font-bold shadow-lg transition-all"
                                                                    title="Tam Yoklama Görünümünü Aç"
                                                                >
                                                                    Yoklama Göster
                                                                </button>
                                                            </div>
                                                        );
                                                    })
                                                ) : (
                                                    <div className="col-span-full text-forest-500 text-xs italic p-4 text-center bg-forest-950/50 rounded border border-forest-800">
                                                        Bu birim için görev tarihi bulunamadı.
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {harcirahStep === 'range_selected' && (
                                        <div className="pt-6 border-t border-forest-700 animate-slide-down">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="font-bold text-white">4. Personel Seçimi ({harcirahPersonnel.length} Kişi Bulundu)</h3>
                                                <div className="flex gap-2">
                                                    <Button variant="secondary" size="sm" onClick={addAllHarcirahPersonnel}>Tümünü Seç</Button>
                                                    <Button variant="success" size="sm" onClick={exportHarcirahExcel} disabled={selectedHarcirahPersonnelIds.size === 0}>
                                                        <LucideIcons.FileSpreadsheet size={16} className="mr-2" /> Şablonu Oluştur (Excel)
                                                    </Button>
                                                </div>
                                            </div>
                                            
                                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
                                                {harcirahPersonnel.map(p => (
                                                    <div 
                                                        key={p.id} 
                                                        onClick={() => toggleHarcirahPerson(p.id)}
                                                        className={`p-3 rounded border cursor-pointer transition-all ${selectedHarcirahPersonnelIds.has(p.id) ? 'bg-forest-700 border-forest-400' : 'bg-forest-950 border-forest-800 opacity-70 hover:opacity-100'}`}
                                                    >
                                                        <div className="flex items-center gap-3 mb-2">
                                                            <div className={`w-4 h-4 rounded-full border flex items-center justify-center ${selectedHarcirahPersonnelIds.has(p.id) ? 'bg-green-500 border-green-400' : 'border-forest-600'}`}>
                                                                {selectedHarcirahPersonnelIds.has(p.id) && <LucideIcons.Check size={10} className="text-white" />}
                                                            </div>
                                                            <div className="flex-1">
                                                                <div className="text-sm font-bold text-white">{p.fullName}</div>
                                                                <div className="text-[10px] text-forest-400 uppercase">{getDisplayTitle(p.title, p.role)}</div>
                                                            </div>
                                                            <button 
                                                                onClick={(e) => { 
                                                                    e.stopPropagation(); 
                                                                    const personUnit = (pers) => {
                                                                        if (YONETIM_NAMES.includes(pers.fullName)) return "YÖNETİM";
                                                                        if (pers.unit) return pers.unit;
                                                                        const titleUpper = (pers.title || '').toLocaleUpperCase('tr-TR');
                                                                        if (titleUpper.includes('BELL')) return "BELL-429";
                                                                        if (titleUpper.includes('C-650')) return "C-650";
                                                                        if (titleUpper.includes('B-360')) return "B-360";
                                                                        if (titleUpper.includes('T-70')) return "T-70";
                                                                        if (titleUpper.includes('AT-802')) return "AT-802";
                                                                        return "İDARİ BİRİM";
                                                                    };
                                                                    setFullAttendanceParams({ 
                                                                        model: personUnit(p), 
                                                                        start: selectedHarcirahRange.start, 
                                                                        end: selectedHarcirahRange.end, 
                                                                        searchName: p.fullName 
                                                                    });
                                                                    setShowFullAttendanceModal(true);
                                                                }} 
                                                                className="p-1.5 hover:bg-forest-800 rounded-lg text-forest-400 hover:text-white transition-colors"
                                                                title="Yoklamada Göster"
                                                            >
                                                                <LucideIcons.Calendar size={16} />
                                                            </button>
                                                        </div>

                                                        {selectedHarcirahPersonnelIds.has(p.id) && (
                                                            <div className="mt-2 pt-2 border-t border-forest-600 animate-fade-in">
                                                                <div className="text-[9px] font-bold text-forest-400 uppercase mb-1 flex justify-between">
                                                                    <span>Görev Günleri</span>
                                                                    <span className="text-forest-200">{selectedHarcirahDates[p.id]?.size || 0} GÜN</span>
                                                                </div>
                                                                <div className="flex flex-wrap gap-1">
                                                                    {getDaysInRange(selectedHarcirahRange.start, selectedHarcirahRange.end).map(date => {
                                                                        const dStr = normalizeDate(date);
                                                                        const isSelected = selectedHarcirahDates[p.id]?.has(dStr);
                                                                        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                                                                        return (
                                                                            <button 
                                                                                key={dStr}
                                                                                onClick={(e) => { e.stopPropagation(); toggleHarcirahDate(p.id, dStr); }}
                                                                                className={`text-[9px] w-6 h-6 flex items-center justify-center rounded border transition-all ${isSelected ? 'bg-forest-500 border-forest-400 text-white' : 'bg-forest-900 border-forest-800 text-forest-500'} ${isWeekend ? 'opacity-80' : ''}`}
                                                                                title={dStr}
                                                                            >
                                                                                {date.getDate()}
                                                                            </button>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </Card>
                        </div>
                    )}

                    {photoModalOpen && photoPerson && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
                            <Card title="Gelişmiş Fotoğraf Yönetimi" className="w-full max-w-md animate-slide-down">
                                <div className="flex flex-col items-center gap-6">
                                    <div 
                                        onPaste={handlePaste}
                                        onDragOver={(e) => e.preventDefault()}
                                        onDrop={handleDrop}
                                        className="relative w-48 h-64 bg-forest-950 border-2 border-dashed border-forest-600 rounded-lg flex flex-col items-center justify-center overflow-hidden group hover:border-forest-400 transition-all cursor-pointer"
                                    >
                                        {tempPhotoData ? (
                                            <img 
                                                src={tempPhotoData} 
                                                className="w-full h-full object-cover transition-transform duration-200" 
                                                style={{ transform: `scale(${zoomLevel})` }}
                                            />
                                        ) : (photoPerson.photoUrl || window.photoCache[photoPerson.id]) ? (
                                            <SafeImage src={photoPerson.photoUrl} personId={photoPerson.id} className="w-full h-full object-cover transition-transform duration-200" style={{ transform: `scale(${zoomLevel})` }} />
                                        ) : (
                                            <div className="text-center p-4">
                                                <Upload size={32} className="mx-auto mb-2 text-forest-600" />
                                                <p className="text-xs text-forest-500">Excel'den Kopyala-Yapıştır<br/>veya Dosya Sürükle</p>
                                            </div>
                                        )}
                                        {loading && <div className="absolute inset-0 bg-black/50 flex items-center justify-center"><Loader2 className="animate-spin text-white" /></div>}
                                    </div>
                                    <div className="w-full text-center space-y-4">
                                        <div>
                                            <div className="text-xl font-bold text-white">{photoPerson.fullName}</div>
                                            <div className="text-sm text-forest-400 uppercase tracking-widest">{getDisplayTitle(photoPerson.title, photoPerson.role)}</div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs text-forest-400 block">Yakınlaştırma / Kırpma Ayarı</label>
                                            <input type="range" min="1" max="3" step="0.1" value={zoomLevel} onChange={(e) => setZoomLevel(parseFloat(e.target.value))} className="w-full accent-forest-500 h-1.5 bg-forest-950 rounded-lg appearance-none cursor-pointer" />
                                        </div>
                                        <div className="grid grid-cols-1 gap-3">
                                            {/* 2) DRIVE GÜNCELLE Butonu (Zoom veya yeni yükleme varsa) */}
                                            {(zoomLevel > 1 || tempPhotoData) && (
                                                <button 
                                                    onClick={handleUpdateDriveWithCrop}
                                                    className="bg-green-600 hover:bg-green-500 text-white text-sm font-bold py-3 rounded flex items-center justify-center gap-2 transition-all shadow-xl animate-pulse"
                                                >
                                                    <LucideIcons.Save size={18} /> DRIVE GÜNCELLE
                                                </button>
                                            )}
                                            
                                            <div className="grid grid-cols-2 gap-2">
                                                <label className="bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-2.5 rounded flex items-center justify-center gap-2 cursor-pointer transition-all shadow-lg active:scale-95">
                                                    <Upload size={16} /> Dosyadan Seç
                                                    <input type="file" className="hidden" accept="image/*" onChange={handleFileUpload} />
                                                </label>
                                                <button 
                                                    disabled={!photoPerson.photoUrl}
                                                    onClick={() => handlePhotoAction('delete_photo')}
                                                    className="bg-red-900/50 hover:bg-red-700 text-red-100 text-sm font-bold py-2.5 rounded flex items-center justify-center gap-2 transition-all disabled:opacity-30 border border-red-800 shadow-lg active:scale-95"
                                                >
                                                    <Trash2 size={16} /> Sil
                                                </button>
                                            </div>
                                            <Button variant="secondary" onClick={() => { setPhotoModalOpen(false); setPhotoPerson(null); setZoomLevel(1); setTempPhotoData(null); }} className="w-full">Pencereyi Kapat</Button>
                                        </div>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    )}

                    {deleteModalOpen && personToDelete && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                            <div className="bg-forest-900 border border-forest-600 p-6 rounded-lg max-w-md w-full shadow-2xl">
                                <h3 className="text-xl font-bold text-white mb-2">Personel İşten Çıkarma</h3>
                                <p className="text-forest-300 text-sm mb-4"><span className="font-bold text-white">{personToDelete.fullName}</span></p>
                                <div className="mb-4">
                                    <label className="block text-xs uppercase text-forest-400 font-bold mb-1">Çıkış Tarihi</label>
                                    <input type="date" className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={terminationDate} onChange={(e) => setTerminationDate(e.target.value)} />
                                </div>
                                <div className="flex flex-col gap-3">
                                    <Button variant="danger" type="button" onClick={terminatePerson} className="w-full"><UserMinus className="mr-2" size={16} /> İşten Çıkar (Arşivle)</Button>
                                    <Button variant="secondary" type="button" onClick={hardDeletePerson} className="w-full bg-red-900/30 text-red-300 border-red-900/50"><Trash2 className="mr-2" size={16} /> Kaydı Tamamen Sil</Button>
                                    <Button variant="secondary" type="button" onClick={() => { setDeleteModalOpen(false); setPersonToDelete(null); }} className="w-full mt-2">İptal</Button>
                                </div>
                            </div>
                        </div>
                    )}

                    {attendancePreviewModalOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4 backdrop-blur-sm">
                            <div className="bg-forest-900 border border-forest-600 rounded-xl max-w-5xl w-full max-h-[90vh] flex flex-col shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div className="p-4 border-b border-forest-700 flex justify-between items-center bg-forest-800/50">
                                    <div>
                                        <h3 className="text-lg font-bold text-white uppercase tracking-tight">Yoklama Önizleme</h3>
                                        <p className="text-xs text-forest-400 font-medium">
                                            {selectedHarcirahUnit} | {selectedHarcirahCity} | {attendancePreviewData.range && new Date(attendancePreviewData.range.start).toLocaleDateString('tr-TR')} - {attendancePreviewData.range && new Date(attendancePreviewData.range.end).toLocaleDateString('tr-TR')}
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => setAttendancePreviewModalOpen(false)}
                                        className="p-2 hover:bg-forest-700 rounded-full text-forest-400 hover:text-white transition-colors"
                                    >
                                        <LucideIcons.X size={24} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-auto p-4 custom-scrollbar">
                                    <table className="w-full text-xs text-forest-200 border-collapse">
                                        <thead className="sticky top-0 bg-forest-900 z-10 shadow-sm">
                                            <tr>
                                                <th className="p-2 text-left border border-forest-700 bg-forest-800/80">Personel</th>
                                                {(() => {
                                                    if (!attendancePreviewData.range) return null;
                                                    const dates = [];
                                                    let curr = new Date(attendancePreviewData.range.start);
                                                    const end = new Date(attendancePreviewData.range.end);
                                                    while(curr <= end) {
                                                        dates.push(new Date(curr).toISOString().split('T')[0]);
                                                        curr.setDate(curr.getDate() + 1);
                                                    }
                                                    return dates.map(d => (
                                                        <th key={d} className="p-1 text-center border border-forest-700 bg-forest-800/80 min-w-[40px]">
                                                            <div className="flex flex-col">
                                                                <span className="text-[10px] opacity-70">{new Date(d).toLocaleDateString('tr-TR', { weekday: 'short' })}</span>
                                                                <span>{new Date(d).getDate()}</span>
                                                            </div>
                                                        </th>
                                                    ));
                                                })()}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {plList
                                                .filter(p => getHarcirahCategory(p) === selectedHarcirahUnit)
                                                .map(p => (
                                                    <tr key={p.id} className="hover:bg-forest-800/30 transition-colors">
                                                        <td className="p-2 border border-forest-700 font-medium sticky left-0 bg-forest-900 z-[5]">{p.fullName}</td>
                                                        {(() => {
                                                            if (!attendancePreviewData.range) return null;
                                                            const dates = [];
                                                            let curr = new Date(attendancePreviewData.range.start);
                                                            const end = new Date(attendancePreviewData.range.end);
                                                            while(curr <= end) {
                                                                dates.push(new Date(curr).toISOString().split('T')[0]);
                                                                curr.setDate(curr.getDate() + 1);
                                                            }
                                                            return dates.map(d => {
                                                                const rec = attendancePreviewData.records.find(r => r.personId === p.id && r.date === d);
                                                                let statusColor = "text-forest-600";
                                                                let statusText = "-";
                                                                if (rec) {
                                                                    if (rec.status === AttendanceStatus.DUTY) {
                                                                        statusColor = "text-blue-400 font-bold";
                                                                        statusText = "G";
                                                                    } else if (rec.status === AttendanceStatus.OFF) {
                                                                        statusColor = "text-red-400";
                                                                        statusText = "İ";
                                                                    } else if (rec.status === AttendanceStatus.WEEKEND) {
                                                                        statusColor = "text-forest-500 opacity-50";
                                                                        statusText = "H";
                                                                    }
                                                                }
                                                                return (
                                                                    <td key={d} className={`p-1 text-center border border-forest-700 ${statusColor}`}>
                                                                        {statusText}
                                                                    </td>
                                                                );
                                                            });
                                                        })()}
                                                    </tr>
                                                ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 bg-forest-800/30 border-t border-forest-700 flex justify-end">
                                    <Button onClick={() => setAttendancePreviewModalOpen(false)}>Kapat</Button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showFullAttendanceModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[70] p-2 sm:p-4 backdrop-blur-md">
                            <div className="bg-forest-950 border border-forest-600 rounded-xl w-full h-full flex flex-col shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
                                <div className="p-4 border-b border-forest-700 flex justify-between items-center bg-forest-900">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-orange-600 p-2 rounded-lg shadow-lg shadow-orange-900/20">
                                            <Calendar size={20} className="text-white" />
                                        </div>
                                        <div>
                                            <h3 className="text-lg font-bold text-white uppercase tracking-tight">Yoklama Görünümü</h3>
                                            <p className="text-xs text-forest-400 font-medium">
                                                {fullAttendanceParams.model} | {new Date(fullAttendanceParams.start).toLocaleDateString('tr-TR')} - {new Date(fullAttendanceParams.end).toLocaleDateString('tr-TR')}
                                            </p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => setShowFullAttendanceModal(false)}
                                        className="p-2 hover:bg-forest-800 rounded-full text-forest-400 hover:text-white transition-all hover:rotate-90 duration-200"
                                    >
                                        <LucideIcons.X size={28} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto relative custom-scrollbar">
                                    <AttendanceView 
                                        initialModel={fullAttendanceParams.model}
                                        initialStartDate={fullAttendanceParams.start}
                                        initialEndDate={fullAttendanceParams.end}
                                        initialSearchName={fullAttendanceParams.searchName}
                                        onSave={(fresh) => setAllAttendance(fresh)}
                                    />
                                </div>
                                <div className="p-3 border-t border-forest-700 bg-forest-900 flex justify-end">
                                    <Button onClick={() => setShowFullAttendanceModal(false)} variant="secondary">Kapat</Button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Improved SafeImage Component to handle Proxy Data and 1️⃣ & 2️⃣ Önbellekleme
        const SafeImage = ({ src, personId, className, style }) => {
            const [data, setData] = useState(null);
            const [error, setError] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // 1) Kalıcı Gerçeklik: Öncelikle Personel ID tabanlı önbelleğe (RAM) bak
                if (personId && window.photoCache[personId]) {
                    setData(window.photoCache[personId]);
                    setLoading(false);
                    return;
                }

                if (!src) { setLoading(false); return; }

                // data: formatıysa (anlık düzenleme vb.) doğrudan kullan ve cache'le
                if (src.startsWith('data:')) {
                    setData(src);
                    if (personId) window.photoCache[personId] = src;
                    setLoading(false);
                    return;
                }

                const fileIdMatch = src.match(/[-\w]{25,}/);
                if (!fileIdMatch) { setLoading(false); setError(true); return; }
                
                const fileId = fileIdMatch[0];
                
                // fileId tabanlı cache kontrolü
                if (window.photoCache[fileId]) {
                    const cached = window.photoCache[fileId];
                    setData(cached);
                    if (personId) window.photoCache[personId] = cached;
                    setLoading(false);
                    return;
                }

                // Backend'den çek
                storageService.fetchSafeImage(fileId).then(res => {
                    if (res) {
                        setData(res);
                        if (personId) window.photoCache[personId] = res;
                    } else {
                        setError(true);
                    }
                    setLoading(false);
                });
            }, [src, personId]);

            if (loading) return <div className={`flex items-center justify-center bg-forest-950 ${className}`}><Loader2 className="animate-spin text-forest-600" size={16} /></div>;
            if (error || !data) return <div className={`flex items-center justify-center bg-forest-950 ${className}`}><User className="text-forest-700" size={16} /></div>;
            return <img src={data} className={className} style={style} />;
        };

        // AttendanceView Component
        const getTodayString = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const getDaysInRange = (start, end) => {
            const dates = [];
            const [sY, sM, sD] = start.split('-').map(Number);
            const [eY, eM, eD] = end.split('-').map(Number);
            
            const current = new Date(sY, sM - 1, sD, 12, 0, 0);
            const endObj = new Date(eY, eM - 1, eD, 12, 0, 0);

            while (current <= endObj) {
                dates.push(new Date(current));
                current.setDate(current.getDate() + 1);
            }
            return dates;
        };

        const ReportDialog = ({ type, onClose, personnel, attendance }) => {
            const today = getTodayString();

            const getPersonUnit = (p) => {
                if (YONETIM_NAMES.includes(p.fullName)) return "YÖNETİM";
                if (p.unit) return p.unit;
                const titleUpper = (p.title || '').toLocaleUpperCase('tr-TR');
                if (titleUpper.includes('BELL')) return "BELL-429";
                if (titleUpper.includes('C-650')) return "C-650";
                if (titleUpper.includes('B-360')) return "B-360";
                if (titleUpper.includes('T-70')) return "T-70";
                if (titleUpper.includes('AT-802')) return "AT-802";
                if (titleUpper.includes('TEKNİ') || titleUpper.includes('UÇAK') || titleUpper.includes('MÜHENDİS')) return "TEKNİK EKİP";
                if (titleUpper.includes('MEMUR') || titleUpper.includes('İŞÇİ') || titleUpper.includes('ŞÖFÖR')) return "YER DESTEK";
                return "İDARİ BİRİM";
            };
            
            const Header = () => (
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-forest-500 pb-4 gap-4">
                    <div className="flex items-center gap-3">
                       <div className="bg-orange-600 p-2 rounded-lg shadow-inner shrink-0 md:p-3"><LucideIcons.Plane className="text-white" size={24} /></div>
                       <div>
                            <h2 className="text-xl md:text-3xl font-extrabold text-white tracking-tight">
                                {type === 'MESAI' && 'MESAİ DURUMU (GÜNLÜK)'}
                                {type === 'FMİ' && 'FAZLA MESAİ İZNİ (GÜNLÜK)'}
                                {type === 'GÖREV' && 'GÖREV DURUMU (GÜNLÜK)'}
                            </h2>
                            <p className="text-forest-400 text-xs md:text-sm font-medium">{new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'long' })}</p>
                       </div>
                    </div>
                    <button onClick={onClose} className="absolute top-4 right-4 md:relative md:top-0 md:right-0 bg-white/10 hover:bg-red-600 text-white p-2 md:p-3 rounded-full transition-all duration-300 group shadow-lg">
                        <LucideIcons.X size={24} className="group-hover:rotate-90 transition-transform" />
                    </button>
                </div>
            );

            const PersonItem = ({ p }) => (
                <div className="flex items-center gap-3 p-2 bg-forest-950/60 rounded-xl border border-forest-700/50 hover:border-orange-500/50 hover:bg-forest-800/60 transition-all duration-300 group shadow-md hover:shadow-orange-500/10 mb-1">
                    <div className="hidden md:block w-12 h-12 rounded-lg border-2 border-forest-700 overflow-hidden bg-forest-900 flex-shrink-0 group-hover:border-orange-500/50 transition-colors">
                        <SafeImage src={p.photoUrl} personId={p.id} className="personnel-photo-square" />
                    </div>
                    <div className="overflow-hidden">
                        <div className="text-sm md:text-lg font-bold text-white group-hover:text-orange-400 transition-colors truncate">{p.fullName}</div>
                        <div className="text-[10px] md:text-xs text-forest-400 font-semibold uppercase tracking-wider truncate">{getDisplayTitle(p.title, p.role)}</div>
                    </div>
                </div>
            );

            const GroupedPersonList = ({ list, title, colorClass, icon: Icon }) => {
                const grouped = list.reduce((acc, p) => {
                    const unit = getPersonUnit(p);
                    if (!acc[unit]) acc[unit] = [];
                    acc[unit].push(p);
                    return acc;
                }, {});

                const units = Object.keys(grouped).sort();

                return (
                    <div className="mb-8">
                        <h3 className={`text-xl md:text-2xl font-black ${colorClass} mb-4 flex items-center gap-3 p-3 md:p-4 rounded-lg border-l-4 shadow-lg ${colorClass.includes('green') ? 'bg-green-950/30 border-green-50' : colorClass.includes('blue') ? 'bg-blue-950/30 border-blue-50' : 'bg-yellow-950/30 border-yellow-500'}`}>
                            <Icon size={24} /> {title} ({list.length})
                        </h3>
                        {units.length === 0 ? (
                            <p className="text-forest-500 italic p-4">Personel bulunamadı.</p>
                        ) : (
                            <div className="space-y-6">
                                {units.map(unit => (
                                    <div key={unit} className="bg-forest-900/10 p-3 rounded-lg border border-forest-800/30">
                                        <div className="flex items-center gap-2 mb-3 border-b border-forest-700/50 pb-2">
                                            <div className="w-1.5 h-4 bg-orange-500 rounded-full"></div>
                                            <span className="text-sm font-black text-forest-100 uppercase tracking-widest">{unit}</span>
                                            <span className="ml-auto bg-forest-800 text-forest-400 text-[10px] px-2 py-0.5 rounded-full">{grouped[unit].length}</span>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-2">
                                            {grouped[unit].map(p => <PersonItem key={p.id} p={p} />)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            if (type === 'MESAI') {
                const mesaiList = personnel.filter(p => {
                    const pStart = p.activeFrom || '2000-01-01';
                    const pEnd = p.activeUntil || '2099-12-31';
                    const isActiveToday = pStart <= today && pEnd >= today;
                    if (!isActiveToday) return false;

                    const r = attendance.find(a => a.personId === p.id && a.date === today);
                    return (r?.status === AttendanceStatus.PRESENT) || (!r); 
                }).sort((a, b) => (a.rank || 999) - (b.rank || 999));

                const beklemeList = personnel.filter(p => {
                    const pStart = p.activeFrom || '2000-01-01';
                    const pEnd = p.activeUntil || '2099-12-31';
                    const isActiveToday = pStart <= today && pEnd >= today;
                    if (!isActiveToday) return false;

                    const r = attendance.find(a => a.personId === p.id && a.date === today);
                    return r?.status === AttendanceStatus.OTHER && r?.note?.toLocaleUpperCase('tr-TR').includes('BEKLEME');
                }).sort((a, b) => (a.rank || 999) - (b.rank || 999));

                const filteredMesai = mesaiList.filter(p => !beklemeList.find(b => b.id === p.id));

                return (
                    <div className="fixed inset-0 bg-forest-950/98 z-[200] overflow-y-auto p-3 md:p-12 animate-fade-in backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto">
                            <Header />
                            <div className="space-y-6">
                                <GroupedPersonList list={filteredMesai} title="MESAİDE OLANLAR" colorClass="text-green-400" icon={LucideIcons.CheckCircle} />
                                <GroupedPersonList list={beklemeList} title="BEKLEME YAZILANLAR" colorClass="text-blue-400" icon={LucideIcons.Activity} />
                            </div>
                        </div>
                    </div>
                );
            }

            if (type === 'GÖREV') {
                const dutyRecs = attendance.filter(a => a.date === today && a.status === AttendanceStatus.DUTY);
                const activeDutyPersonnel = personnel.filter(p => {
                    const pStart = p.activeFrom || '2000-01-01';
                    const pEnd = p.activeUntil || '2099-12-31';
                    return pStart <= today && pEnd >= today;
                });
                const dutyPersonnelIds = new Set(dutyRecs.map(r => r.personId));
                const finalDutyPersonnel = activeDutyPersonnel.filter(p => dutyPersonnelIds.has(p.id));
                const locations = [...new Set(dutyRecs.filter(r => activeDutyPersonnel.some(p => p.id === r.personId)).map(r => (r.dutyLocation || 'BELİRSİZ').toLocaleUpperCase('tr-TR')))].sort();

                return (
                    <div className="fixed inset-0 bg-forest-950/98 z-[200] overflow-y-auto p-3 md:p-12 animate-fade-in backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto">
                            <Header />
                            {locations.length === 0 ? (
                                <div className="text-center py-10 bg-forest-900/20 rounded-3xl border border-dashed border-forest-700">
                                    <LucideIcons.Search size={48} className="mx-auto text-forest-600 mb-4" />
                                    <p className="text-forest-400 text-lg">Bugün görevde olan personel bulunamadı.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-10">
                                    {locations.map(loc => {
                                        const peopleInLoc = finalDutyPersonnel.filter(p => dutyRecs.some(r => r.personId === p.id && (r.dutyLocation || 'BELİRSİZ').toLocaleUpperCase('tr-TR') === loc))
                                            .sort((a, b) => (a.rank || 999) - (b.rank || 999));
                                        
                                        const grouped = peopleInLoc.reduce((acc, p) => {
                                            const unit = getPersonUnit(p);
                                            if (!acc[unit]) acc[unit] = [];
                                            acc[unit].push(p);
                                            return acc;
                                        }, {});
                                        const units = Object.keys(grouped).sort();

                                        return (
                                            <div key={loc} className="bg-forest-900/20 p-4 md:p-6 rounded-2xl border border-forest-800/50 shadow-xl self-start">
                                                <h3 className="text-lg md:text-xl font-black text-orange-400 mb-4 flex items-center gap-3 border-b border-orange-500/30 pb-2 uppercase tracking-tighter">
                                                    <LucideIcons.MapPin size={20} /> {loc} <span className="ml-auto bg-orange-600/20 text-orange-400 text-xs px-2 py-0.5 rounded-full">{peopleInLoc.length}</span>
                                                </h3>
                                                <div className="space-y-6">
                                                   {units.map(unit => (
                                                       <div key={unit}>
                                                           <div className="text-[10px] font-black text-forest-500 uppercase tracking-[0.2em] mb-2 px-1 border-l-2 border-forest-700">{unit}</div>
                                                           <div className="space-y-1">
                                                               {grouped[unit].map(p => <PersonItem key={p.id} p={p} />)}
                                                           </div>
                                                       </div>
                                                   ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (type === 'FMİ') {
                const fmiPeople = personnel.filter(p => {
                    const pStart = p.activeFrom || '2000-01-01';
                    const pEnd = p.activeUntil || '2099-12-31';
                    const isActiveToday = pStart <= today && pEnd >= today;
                    if (!isActiveToday) return false;

                    const r = attendance.find(a => a.personId === p.id && a.date === today);
                    return r?.status === AttendanceStatus.LEAVE && r?.leaveType === LeaveType.OVERTIME;
                }).sort((a, b) => (a.rank || 999) - (b.rank || 999));

                return (
                    <div className="fixed inset-0 bg-forest-950/98 z-[200] overflow-y-auto p-3 md:p-12 animate-fade-in backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto">
                            <Header />
                            <div className="max-w-4xl mx-auto">
                                <GroupedPersonList list={fmiPeople} title="FAZLA MESAİ İZNİ (F.M.İ)" colorClass="text-yellow-400" icon={LucideIcons.CalendarDays} />
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const AttendanceView = ({ initialModel = null, initialStartDate = getTodayString(), initialEndDate = getTodayString(), initialSearchName = null, onSave: onSaveExternal }) => {
            const [selModel, setSelModel] = useState(initialModel);
            const [searchName, setSearchName] = useState(initialSearchName);
            const [rangeStartDate, setRangeStartDate] = useState(initialStartDate);
            const [rangeEndDate, setRangeEndDate] = useState(initialEndDate);
            
            const [models, setModels] = useState([]);
            const [inv, setInv] = useState([]);
            const [allRecs, setAllRecs] = useState([]);
            const [allPersonnel, setAllPersonnel] = useState([]);
            const [dashboardStatus, setDashboardStatus] = useState({});

            const [people, setPeople] = useState([]);
            const [att, setAtt] = useState({});
            const [loading, setLoading] = useState(true);
            const [isOrderChanged, setIsOrderChanged] = useState(false);

            // Tab State
            const [activeTab, setActiveTab] = useState('PILOT');

            // Modal
            const [detailModalOpen, setDetailModalOpen] = useState(false);
            const [detailPerson, setDetailPerson] = useState(null);
            const [detailDays, setDetailDays] = useState({});

            // Tooltip state for photo hover
            const [hoverPhoto, setHoverPhoto] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            // Report
            const [dates, setDates] = useState({ start: getTodayString(), end: getTodayString() });
            const [isReportReady, setIsReportReady] = useState(false);
            const [reportUnit, setReportUnit] = useState('TÜM BİRİMLER');
            const [reportSearch, setReportSearch] = useState('');
            const [reportModalType, setReportModalType] = useState(null);

            const showAttendanceFromReport = () => {
                if (reportUnit === 'TÜM BİRİMLER') {
                    alert('Lütfen bir birim seçiniz.');
                    return;
                }
                setRangeStartDate(dates.start);
                setRangeEndDate(dates.end);
                setSelModel(reportUnit);
            };

            // Security States
            const [isEditUnlocked, setIsEditUnlocked] = useState(false);
            const [showUnlockModal, setShowUnlockModal] = useState(false);
            const [unlockPassword, setUnlockPassword] = useState('');
            const [pendingAction, setPendingAction] = useState(null);

            // Data Load
            const loadDashboardData = useCallback(async () => {
                const [ac, pl, [recs, syncedPl]] = await Promise.all([
                    storageService.getAircraft(),
                    storageService.getPersonnel(),
                    Promise.all([
                        storageService.getAttendanceSync(),
                        storageService.getPersonnelSync()
                    ])
                ]);

                // DATA MIGRATION: Remove old combined unit
                let updatedAc = [...ac];
                const oldUnitIndex = updatedAc.findIndex(a => a.model === 'TEKNİK EKİP VE DESTEK');
                const teknikEkipIndex = updatedAc.findIndex(a => a.model === AircraftModel.TEKNIK_EKIP);
                const yerDestekIndex = updatedAc.findIndex(a => a.model === AircraftModel.YER_DESTEK);
                
                let modified = false;
                
                if (oldUnitIndex !== -1) {
                    updatedAc.splice(oldUnitIndex, 1);
                    modified = true;
                }
                if (teknikEkipIndex !== -1) {
                    updatedAc.splice(updatedAc.findIndex(a => a.model === AircraftModel.TEKNIK_EKIP), 1);
                    modified = true;
                }
                if (yerDestekIndex !== -1) {
                    updatedAc.splice(updatedAc.findIndex(a => a.model === AircraftModel.YER_DESTEK), 1);
                    modified = true;
                }

                if (modified) {
                    storageService.saveAircraft(updatedAc);
                }

                setInv(updatedAc);
                const uniqueModels = [...new Set(updatedAc.map(a => a.model))].filter(m => m && m.length > 1 && m !== 'e' && m !== AircraftModel.TEKNIK_EKIP && m !== AircraftModel.YER_DESTEK).sort();
                setModels(uniqueModels);
                setAllPersonnel(syncedPl || pl);
                setAllRecs(recs || []);

                const finalPersonnel = syncedPl || pl;
                if (finalPersonnel.length > 0) {
                    const statusMap = {};
                    const today = getTodayString();
                    
                    const specificAircraftTags = uniqueModels
                        .filter(m => m !== AircraftModel.YER_DESTEK && m !== AircraftModel.TEKNIK_EKIP && m !== AircraftModel.IDARI_BIRIM)
                        .map(m => m.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ]/g, '').toLocaleUpperCase('tr-TR'));

                    uniqueModels.forEach(m => {
                        const mNameNormalized = m.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ]/g, '').toLocaleUpperCase('tr-TR');
                        
                        const relevantPersonnel = finalPersonnel.filter(p => {
                            // EXCLUDE MANAGEMENT NAMES FROM REGULAR AIRCRAFT LISTS
                            if (YONETIM_NAMES.includes(p.fullName)) return false;

                            const pStart = p.activeFrom || '2000-01-01';
                            const pEnd = p.activeUntil || '2099-12-31';
                            if (today < pStart || today > pEnd) return false;

                            // 1. PRIORITIZE EXPLICIT UNIT ASSIGNMENT
                            if (p.unit) {
                                return p.unit === m;
                            }

                            // 2. FALLBACK TO TITLE/ROLE MATCHING
                            const titleUpper = (p.title || '').toLocaleUpperCase('tr-TR');
                            const role = p.role;
                            const tClean = titleUpper.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ]/g, '');

                            const belongsToSpecificAircraft = specificAircraftTags.some(tag => tClean.includes(tag));

                            if (m === AircraftModel.YER_DESTEK) {
                                if (p.fullName.includes('SERKAN KOTAN')) return true; // Force include SERKAN KOTAN
                                if (belongsToSpecificAircraft) return false; 
                                const isTechnicalRole = titleUpper.includes('UÇAK TEKNİ') || titleUpper.includes('MÜHENDİS');
                                if (isTechnicalRole) return false;

                                const isGroundRole = [Role.DRIVER, Role.CLEANING, Role.KITCHEN, Role.TEA_SERVICE, Role.OTHER].includes(role);
                                const isGroundTitle = titleUpper.includes('MEMUR') || titleUpper.includes('İŞÇİ') || titleUpper.includes('ŞÖFÖR');
                                return isGroundRole || isGroundTitle;
                            } else if (m === AircraftModel.TEKNIK_EKIP) {
                                if (p.fullName.includes('SERKAN KOTAN')) return false; // Force exclude SERKAN KOTAN
                                if (belongsToSpecificAircraft) return false;
                                return titleUpper.includes('UÇAK TEKNİ') || titleUpper.includes('MÜHENDİS');
                            } else {
                                return tClean.includes(mNameNormalized);
                            }
                        });

                        const pilots = relevantPersonnel.filter(p => p.role === Role.PILOT || (p.title && p.title.toLocaleUpperCase('tr-TR').includes('PİLOT')));
                        const techs = relevantPersonnel.filter(p => !pilots.includes(p));

                        const pilotDataExists = pilots.length > 0 && pilots.some(p => (recs || []).some(r => r.date === today && r.personId === p.id));
                        const techDataExists = techs.length > 0 && techs.some(p => (recs || []).some(r => r.date === today && r.personId === p.id));
                        const groundDataExists = relevantPersonnel.length > 0 && relevantPersonnel.some(p => (recs || []).some(r => r.date === today && r.personId === p.id));

                        const isGroundUnit = m === AircraftModel.YER_DESTEK;
                        const isTechnicalUnit = m === AircraftModel.TEKNIK_EKIP;

                        statusMap[m] = {
                            pilotMissing: !isGroundUnit && !isTechnicalUnit && pilots.length > 0 && !pilotDataExists,
                            techMissing: (!isGroundUnit && techs.length > 0 && !techDataExists) || (isTechnicalUnit && !techDataExists),
                            groundMissing: isGroundUnit && !groundDataExists
                        };
                    });

                    // Check YONETIM Status
                    const yonetimMembers = finalPersonnel.filter(p => YONETIM_NAMES.includes(p.fullName));
                    const yonetimHasData = yonetimMembers.some(p => (recs || []).some(r => r.date === today && r.personId === p.id));
                    statusMap['YÖNETİM'] = { missing: !yonetimHasData && yonetimMembers.length > 0 };

                    setDashboardStatus(statusMap);
                }
            }, []);

            useEffect(() => {
                setLoading(true);
                storageService.preload()
                    .then(() => loadDashboardData())
                    .then(() => setLoading(false))
                    .catch(e => {
                        console.error(e);
                        setLoading(false);
                    });
            }, [loadDashboardData]);

            const handleBackToDashboard = async () => {
                setLoading(true);
                try {
                    await storageService.refresh();
                    await loadDashboardData();
                    setSelModel(null);
                    setIsOrderChanged(false);
                } catch (e) {
                    alert("Veriler güncellenirken bir hata oluştu, lütfen sayfayı yenileyiniz.");
                    console.error(e);
                    setSelModel(null);
                } finally {
                    setLoading(false);
                }
            };

            const movePerson = (index, direction) => {
                const newPeople = [...people];
                if (direction === 'up' && index > 0) {
                    [newPeople[index], newPeople[index - 1]] = [newPeople[index - 1], newPeople[index]];
                } else if (direction === 'down' && index < newPeople.length - 1) {
                    [newPeople[index], newPeople[index + 1]] = [newPeople[index + 1], newPeople[index]];
                }
                setPeople(newPeople);
                setIsOrderChanged(true);
            };

            const saveOrder = async () => {
                setLoading(true);
                try {
                    // Update RANK for all personnel based on current order in 'people'
                    // Note: 'people' is a subset, but we should update their rank globally
                    const updatedGlobalList = allPersonnel.map(p => {
                        const idx = people.findIndex(x => x.id === p.id);
                        if (idx !== -1) {
                            return { ...p, rank: idx + 1 };
                        }
                        return p;
                    });
                    
                    await storageService.savePersonnel(updatedGlobalList);
                    setAllPersonnel(updatedGlobalList);
                    setIsOrderChanged(false);
                    alert("Sıralama kaydedildi.");
                } catch (e) {
                    alert("Sıralama kaydedilemedi: " + e.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (selModel || searchName) {
                    setLoading(true);
                    setActiveTab('PILOT');

                    let targetP = [];

                    if (searchName && !selModel) {
                        // Search by name across all personnel
                        targetP = allPersonnel.filter(p => 
                            p.fullName.toLocaleUpperCase('tr-TR').includes(searchName.toLocaleUpperCase('tr-TR'))
                        );
                    } else if (selModel === 'YÖNETİM') {
                         targetP = allPersonnel.filter(p => YONETIM_NAMES.includes(p.fullName)).sort((a, b) => (a.rank || 999) - (b.rank || 999));
                         if (searchName) {
                            targetP = targetP.filter(p => p.fullName.toLocaleUpperCase('tr-TR').includes(searchName.toLocaleUpperCase('tr-TR')));
                         }
                         setPeople(targetP);
                         setLoading(false);
                         return;
                    } else if (selModel) {
                        const specificAircraftTags = models
                            .filter(m => m !== AircraftModel.YER_DESTEK && m !== AircraftModel.TEKNIK_EKIP && m !== AircraftModel.IDARI_BIRIM)
                            .map(m => m.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ]/g, '').toLocaleUpperCase('tr-TR'));

                        targetP = allPersonnel.filter(p => {
                            // EXCLUDE MANAGEMENT NAMES FROM REGULAR AIRCRAFT LISTS
                            if (YONETIM_NAMES.includes(p.fullName)) return false;

                            const pStart = p.activeFrom || '2000-01-01';
                            const pEnd = p.activeUntil || '2099-12-31';
                            const isActiveInRange = pStart <= rangeEndDate && pEnd >= rangeStartDate;
                            
                            if (!isActiveInRange) return false;

                            // 1. PRIORITIZE EXPLICIT UNIT ASSIGNMENT
                            if (p.unit) {
                                return p.unit === selModel;
                            }

                            // 2. FALLBACK TO TITLE/ROLE MATCHING
                            const titleUpper = (p.title || '').toLocaleUpperCase('tr-TR');
                            const role = p.role;
                            const tClean = titleUpper.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ]/g, '');

                            const belongsToSpecificAircraft = specificAircraftTags.some(tag => tClean.includes(tag));

                            if (selModel === AircraftModel.YER_DESTEK) {
                                if (p.fullName.includes('SERKAN KOTAN')) return true; // Force include SERKAN KOTAN
                                if (belongsToSpecificAircraft) return false;
                                
                                const isTechnicalRole = titleUpper.includes('UÇAK TEKNİ') || titleUpper.includes('MÜHENDİS');
                                if (isTechnicalRole) return false;

                                const isGroundRole = [Role.DRIVER, Role.CLEANING, Role.KITCHEN, Role.TEA_SERVICE, Role.OTHER].includes(role);
                                const isGroundTitle = titleUpper.includes('MEMUR') || titleUpper.includes('İŞÇİ') || titleUpper.includes('ŞÖFÖR');
                                return isGroundRole || isGroundTitle;
                            } else if (selModel === AircraftModel.TEKNIK_EKIP) {
                                if (p.fullName.includes('SERKAN KOTAN')) return false; // Force exclude SERKAN KOTAN
                                if (belongsToSpecificAircraft) return false;
                                return titleUpper.includes('UÇAK TEKNİ') || titleUpper.includes('MÜHENDİS');
                            } else if (selModel === AircraftModel.IDARI_BIRIM) {
                                return (titleUpper === 'MEMUR' || titleUpper.includes('İDARİ')) && !belongsToSpecificAircraft;
                            } else {
                                const mNameNormalized = selModel.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ]/g, '').toLocaleUpperCase('tr-TR');
                                return tClean.includes(mNameNormalized);
                            }
                        });

                        if (searchName) {
                            targetP = targetP.filter(p => 
                                p.fullName.toLocaleUpperCase('tr-TR').includes(searchName.toLocaleUpperCase('tr-TR'))
                            );
                        }
                    }

                    targetP.sort((a, b) => (a.rank || 999) - (b.rank || 999));

                    setTimeout(() => {
                        setPeople(targetP);
                        setLoading(false);
                    }, 300);
                }
            }, [selModel, searchName, allPersonnel, rangeStartDate, rangeEndDate, models]);

            useEffect(() => {
                const next = {};
                const referenceDate = rangeStartDate;
                const dObj = new Date(referenceDate); 
                const isWe = dObj.getDay() === 0 || dObj.getDay() === 6;

                people.forEach(p => {
                    const r = allRecs.find(x => x.personId === p.id && x.date === referenceDate);
                    
                    // Check for weekend inclusion history (look at Saturday record of this specific week)
                    let hasWeekendRecord = false;
                    if (rangeStartDate !== rangeEndDate) { // Weekly view
                         // Find Saturday of this specific week
                         const [y, m, d] = referenceDate.split('-').map(Number);
                         const current = new Date(y, m-1, d, 12,0,0);
                         const dayOfWeek = current.getDay();
                         const diffToSat = (dayOfWeek === 0) ? -1 : (6 - dayOfWeek); // Days until Saturday
                         const satDate = new Date(current);
                         satDate.setDate(current.getDate() + diffToSat);
                         const satStr = normalizeDate(satDate);
                         
                         const satRec = allRecs.find(x => x.personId === p.id && x.date === satStr);
                         // If Saturday has a record that matches criteria
                         if (satRec) {
                             if (satRec.status === AttendanceStatus.DUTY) {
                                 hasWeekendRecord = true;
                             }
                             if (satRec.status === AttendanceStatus.LEAVE && satRec.leaveType === LeaveType.OVERTIME) {
                                 hasWeekendRecord = true;
                             }
                         }
                    }

                    if (r) {
                        next[p.id] = {
                            ...r,
                            leaveType: r.leaveType || LeaveType.DAILY,
                            dutyType: r.dutyType || DutyType.PLANNED,
                            includeWeekend: hasWeekendRecord
                        };
                    } else {
                        const hist = allRecs.filter(x => x.personId === p.id && x.date < referenceDate).sort((a, b) => b.date.localeCompare(a.date))[0];
                        if (isWe) {
                            if (hist && hist.status === AttendanceStatus.DUTY) {
                                next[p.id] = { status: hist.status, dutyLocation: hist.dutyLocation, dutyType: hist.dutyType || DutyType.PLANNED, includeWeekend: hasWeekendRecord };
                            } else {
                                next[p.id] = { status: AttendanceStatus.PRESENT };
                            }
                        } else {
                            if (hist && referenceDate >= getTodayString()) {
                                // KRİTİK DÜZELTME: İzin, Rapor gibi durumların sonsuza kadar taşınmasını engelle
                                const carryOverStatuses = [AttendanceStatus.PRESENT, AttendanceStatus.DUTY];
                                if (carryOverStatuses.includes(hist.status)) {
                                    next[p.id] = {
                                        ...hist,
                                        leaveType: hist.leaveType || LeaveType.DAILY,
                                        dutyType: hist.dutyType || DutyType.PLANNED,
                                        includeWeekend: hasWeekendRecord
                                    };
                                } else {
                                    // İzin, Rapor, Kurs vb. durumlar bittiyse otomatik olarak Mesai'ye dön
                                    next[p.id] = { status: AttendanceStatus.PRESENT, includeWeekend: hasWeekendRecord };
                                }
                            } else {
                                next[p.id] = { status: AttendanceStatus.PRESENT, includeWeekend: hasWeekendRecord };
                            }
                        }
                    }
                });
                setAtt(next);
            }, [people, allRecs, rangeStartDate]);

            const save = async () => {
                setLoading(true);

                const days = getDaysInRange(rangeStartDate, rangeEndDate);
                const dayStrings = days.map(d => normalizeDate(d));
                const isWeeklyMode = rangeStartDate !== rangeEndDate;

                // Determine which people have "mixed/detailed" records (Blurred rows)
                // We must skip saving for them to prevent overwriting detailed data with bulk data.
                const personsToSkip = new Set();
                if (isWeeklyMode) {
                    people.forEach(p => {
                        const recordsInRange = days.map(d => {
                            const checkDate = normalizeDate(d);
                            return allRecs.find(r => r.personId === p.id && r.date === checkDate);
                        }).filter(r => !!r);

                        if (recordsInRange.length > 0) {
                            if (recordsInRange.length < days.length) {
                                personsToSkip.add(p.id); // Partial data -> Blurred
                            } else {
                                const firstRec = recordsInRange[0];
                                const isUniform = recordsInRange.every(r => 
                                    r.status === firstRec.status &&
                                    r.dutyType === firstRec.dutyType &&
                                    r.dutyLocation === firstRec.dutyLocation &&
                                    r.leaveType === firstRec.leaveType &&
                                    r.note === firstRec.note
                                );
                                if (!isUniform) personsToSkip.add(p.id); // Mixed data -> Blurred
                            }
                        }
                    });
                }
