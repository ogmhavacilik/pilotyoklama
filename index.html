        // --- UTILS ---
        const fixDriveUrl = (url) => {
            if (!url) return '';
            const driveMatch = url.match(/[-\w]{25,}/);
            if (url.includes('drive.google.com') && driveMatch) {
                return `https://drive.google.com/uc?export=view&id=${driveMatch[0]}`;
            }
            return url;
        };

        // --- SERVICES ---
        const normalizeDate = (d) => {
            if (!d) return '';
            if (d instanceof Date) {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }
            if (typeof d === 'string') {
                if (d.includes('T')) return d.split('T')[0];
                if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
                if (d.length >= 10) return d.substring(0, 10);
            }
            return '';
        };

        const getDisplayTitle = (title, role) => {
            if (!title && !role) return '';
            const rawTitle = (title || role || '').toString();
            const t = rawTitle.toLocaleUpperCase('tr-TR');

                t.includes('T-70') || 
                t.includes('BELL-429') || 
                t.includes('C-650') || 
                t.includes('B-360')) {
                if (t.includes('TEKNİSYEN') || t.includes('TEKNİKER')) {
                    return 'Uçuş Teknisyeni';
                }
            }
            
            // 2. General Technician/Techniker Logic
            if (t.includes('TEKNİSYEN')) return 'Teknisyen';
            if (t.includes('TEKNİKER')) return 'Tekniker';

                const others = existing.filter(e => !newRecords.some(n => n.personId === e.personId && n.date === e.date));
                const merged = [...others, ...newRecords];
                localStorage.setItem('ogm_attendance', JSON.stringify(merged));
                return merged;
            }
        };

        const memoryCache = {
            aircraft: null,
            personnel: null,
            attendance: null,
            loaded: false
        };

        const apiCall = async (action, payload = {}) => {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000); 
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    redirect: 'follow',
                    body: JSON.stringify({ action, ...payload }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const json = await response.json();
                if (!json.success) throw new Error(json.error || 'API Error');
                return json.data;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        };

        const storageService = {
            preload: async () => {
                try {
                    const data = await apiCall('get_init_data');
                    if (data.aircraft) {
                        const formattedAC = data.aircraft.map(a => ({ ...a, id: String(a.id) }));
                        localData.saveAircraft(formattedAC);
                        memoryCache.aircraft = formattedAC;
                    }
                    if (data.personnel) {
                        let formattedPL = data.personnel.map(p => {
                            // TC No için tüm olası anahtar varyasyonlarını tara (TC NO, TC no, tc_no, TC, tcNo vb.)
                            let foundTc = '';
                            const tcKeys = ['tcNo', 'TC NO', 'TC no', 'tc_no', 'TC', 'tcno', 'TcNo'];
                            for (const k of tcKeys) {
                                if (p[k]) {
                                    foundTc = String(p[k]);
                                    break;
                                }
                            }
                            // Eğer hala bulunamadıysa içinde 'TC' geçen ilk anahtara bak
                            if (!foundTc) {
                                const altKey = Object.keys(p).find(k => k.toUpperCase().includes('TC'));
                                if (altKey) foundTc = String(p[altKey]);
                            }

                            return { 
                                ...p, 
                                id: String(p.id), 
                                photoUrl: fixDriveUrl(p.photoUrl),
                                tcNo: foundTc || ''
                            };
                        });
                        INITIAL_PERSONNEL.forEach(initP => {
                            if (!formattedPL.some(p => p.id === initP.id)) {
                                formattedPL.push(initP);
                            }
                        });
                        formattedPL.sort((a, b) => (a.rank || 999) - (b.rank || 999));
                        localData.savePersonnel(formattedPL);
                        memoryCache.personnel = formattedPL;
                    }

                    const att = await apiCall('get_attendance');
                    const formattedAtt = att.map(r => ({
                        ...r,
                        id: String(r.id),
                        personId: String(r.personId),
                        date: normalizeDate(r.date),
                        status: r.status === 'İzinli' ? 'İzin' : r.status
                    }));

                    localData.setAttendance(formattedAtt);
                    memoryCache.attendance = formattedAtt;
                    memoryCache.loaded = true;
                } catch (e) {
                    console.warn("Preload failed, using local", e);
                    memoryCache.aircraft = localData.getAircraft();
                    memoryCache.personnel = localData.getPersonnel();
                    memoryCache.attendance = localData.getAttendance();
                    memoryCache.loaded = true;
                }
            },
            refresh: async () => {
                memoryCache.loaded = false;
                await storageService.preload();
            },
            getAttendanceSync: () => memoryCache.attendance || localData.getAttendance(),
            getPersonnelSync: () => memoryCache.personnel || localData.getPersonnel(),
            getAircraft: async () => {
                if (!memoryCache.loaded) await storageService.preload();
                return memoryCache.aircraft || localData.getAircraft();
            },
            saveAircraft: async (data) => {
                localData.saveAircraft(data);
                memoryCache.aircraft = data;
                try { await apiCall('save_aircraft', { aircraft: data }); } catch (e) { }
            },
            getPersonnel: async () => {
                if (!memoryCache.loaded) await storageService.preload();
                return memoryCache.personnel || localData.getPersonnel();
            },
            savePersonnel: async (data) => {
                localData.savePersonnel(data);
                memoryCache.personnel = data;
                try { await apiCall('save_personnel', { personnel: data }); } catch (e) { }
            },
            getAttendance: async () => {
                if (!memoryCache.loaded) await storageService.preload();
                return memoryCache.attendance || localData.getAttendance();
            },
            saveAttendance: async (data) => {
                const updatedFullList = localData.saveAttendance(data);
                memoryCache.attendance = updatedFullList;
                apiCall('save_attendance', { records: data }).catch(e => console.error("BG Save fail", e));
                return updatedFullList;
            },
            fetchSafeImage: async (fileId) => {
                if (window.photoCache[fileId]) return window.photoCache[fileId];
                try {
                    const res = await apiCall('get_safe_image', { fileId });
                    if (res) {
                        window.photoCache[fileId] = res;
                        return res;
                    }
                    return null;
                } catch(e) {
                    return null;
                }
            },
            initBackgroundCaching: async (personnelList) => {
                return; 
            }
        };

        // --- COMPONENTS ---

        // Button Component
        const Button = ({ variant = 'primary', size = 'md', className = '', children, ...props }) => {
            const v = {
                primary: 'bg-forest-500 hover:bg-forest-400 text-white',
                secondary: 'bg-forest-800 border border-forest-600 hover:bg-forest-700 text-white',
                danger: 'bg-red-600 hover:bg-red-500 text-white',
                success: 'bg-green-600 hover:bg-green-500 text-white'
            }[variant];

            const s = {
                sm: 'px-2 py-1 text-xs',
                md: 'px-4 py-2 text-sm',
                lg: 'px-6 py-3 text-base'
            }[size];

            return (
                <button className={`inline-flex items-center justify-center font-medium rounded-md transition-colors ${s} ${v} ${className}`} {...props}>
                    {children}
                </button>
            );
        };

        // Card Component
        const Card = ({ children, title, className = '' }) => (
            <div className={`bg-forest-900 border border-forest-700 shadow-xl rounded-lg overflow-hidden ${className}`}>
                {title && (
                    <div className="bg-forest-950 px-4 py-3 border-b border-forest-700 font-semibold text-forest-50">
                        {title}
                    </div>
                )}
                <div className="p-4">{children}</div>
            </div>
        );

        // Icons
        const { 
            ShieldCheck, Menu, X, LogOut, Plane, Fan, Truck, Wrench, Settings, 
            Trash2, XCircle, ArrowUp, ArrowDown, UserMinus, MapPin, Search, 
            AlertCircle, Users, Globe, Calendar, MessageSquare, CheckCircle, 
            BarChart3, Activity, FileText, Loader2, Plus, Edit2, MoreVertical, 
            CalendarDays, Lock, BookOpen, Camera, Upload, Image: ImageIcon, User, Save
        } = LucideIcons;

        const ModelIcon = ({ category, model, className }) => {
            if (model === AircraftModel.YER_DESTEK) return <Truck className={className} />;
            if (model === AircraftModel.TEKNIK_EKIP) return <Wrench className={className} />;

        // AttendanceControl Component
        const AttendanceControl = ({ personId, state, isWeeklyMode, isWeekend, aircraftModel, onChangeStatus, onChangeDetail }) => {

            const getLocations = () => {

                if (aircraftModel === AircraftModel.AT_802) {
                    return ['Çanakkale', 'Milas', 'Balıkesir/ Edremit', 'İzmir /Efes', 'Bursa', 'Antalya', 'YURT DIŞI', 'DİĞER'];
                }
                if (aircraftModel === AircraftModel.BELL_429) {
                    return ['Çanakkale', 'İzmir', 'Muğla', 'Antalya', 'Ankara', 'YURT DIŞI', 'DİĞER'];
                }
                if (aircraftModel === AircraftModel.B_360 || aircraftModel === AircraftModel.C_650) {

            const locations = getLocations();

            return (
                <div className="flex flex-col xl:flex-row items-start xl:items-center gap-4 w-full">
                    <div className="flex flex-wrap gap-2 w-full xl:w-auto">
                        <button onClick={() => handleToggleStatus(AttendanceStatus.PRESENT)} className={`px-3 py-1.5 text-xs sm:text-sm border rounded-md transition-all flex-grow sm:flex-grow-0 ${status === AttendanceStatus.PRESENT || !status ? 'bg-green-600 border-green-500 text-white' : 'bg-forest-900 border-forest-700 text-forest-400 hover:border-forest-500'}`}>
                            Mesai
                        </button>

                        <button onClick={() => handleToggleStatus(AttendanceStatus.DUTY)} className={`px-3 py-1.5 text-xs sm:text-sm border rounded-md transition-all flex-grow sm:flex-grow-0 ${status === AttendanceStatus.DUTY ? 'bg-blue-600 border-blue-500 text-white' : 'bg-forest-900 border-forest-700 text-forest-400 hover:border-forest-500'}`}>
                            Görev
                        </button>
                         <button onClick={() => handleToggleStatus(AttendanceStatus.COURSE)} className={`px-3 py-1.5 text-xs sm:text-sm border rounded-md transition-all flex-grow sm:flex-grow-0 ${status === AttendanceStatus.COURSE ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-forest-900 border-forest-700 text-forest-400 hover:border-forest-500'}`}>
                            Kurs
                        </button>

                        {[AttendanceStatus.LEAVE, AttendanceStatus.SICK, AttendanceStatus.HOSPITAL].map((s) => {
                            const isSelected = status === s;
                            let activeClass = '';
                            if (isSelected) {
                                if (s === AttendanceStatus.LEAVE) activeClass = 'bg-yellow-600 border-yellow-500 text-white';
                                else if (s === AttendanceStatus.HOSPITAL) activeClass = 'bg-pink-600 border-pink-500 text-white';
                                else activeClass = 'bg-red-500 border-red-400 text-white';
                            } else {
                                activeClass = 'bg-forest-900 border-forest-700 text-forest-400 hover:border-forest-500';
                            }
                            return (
                                <button key={s} onClick={() => handleToggleStatus(s)} className={`px-3 py-1.5 text-xs sm:text-sm border rounded-md transition-all flex-grow sm:flex-grow-0 ${activeClass}`}>
                                    {s}
                                </button>
                            );
                        })}

                        <button
                            onClick={() => handleToggleStatus(AttendanceStatus.PUBLIC_HOLIDAY)}
                            className={`px-3 py-1.5 text-xs sm:text-sm border rounded-md transition-all flex-grow sm:flex-grow-0 ${status === AttendanceStatus.PUBLIC_HOLIDAY
                                    ? 'bg-orange-600 border-orange-500 text-white'
                                    : 'bg-forest-900 border-forest-700 text-forest-400 hover:border-forest-500'
                                }`}
                        >
                            İdari İzin
                        </button>

                        <button
                            onClick={() => handleToggleStatus(AttendanceStatus.OTHER)}
                            className={`px-3 py-1.5 text-xs sm:text-sm border rounded-md transition-all flex-grow sm:flex-grow-0 ${status === AttendanceStatus.OTHER
                                    ? 'bg-purple-600 border-purple-500 text-white'
                                    : 'bg-forest-900 border-forest-700 text-forest-400 hover:border-forest-500'
                                }`}
                        >
                            Diğer
                        </button>

                         <button onClick={() => handleToggleStatus(AttendanceStatus.ABSENT)} className={`px-3 py-1.5 text-xs sm:text-sm border rounded-md transition-all flex-grow sm:flex-grow-0 ${status === AttendanceStatus.ABSENT ? 'bg-red-600 border-red-500 text-white' : 'bg-forest-900 border-forest-700 text-forest-400 hover:border-forest-500'}`}>
                            Yok
                        </button>
                    </div>

                    {status === AttendanceStatus.DUTY && (
                        <div className="w-full flex flex-col gap-2 animate-fade-in bg-forest-900/50 p-2 rounded border border-blue-500/30">
                            <div className="flex flex-wrap items-center gap-4 text-xs text-forest-300 px-1">
                                <label className="flex items-center gap-1 cursor-pointer">
                                    <input type="radio" checked={state?.dutyType !== DutyType.UNPLANNED} onChange={() => onChangeDetail(personId, 'dutyType', DutyType.PLANNED)} className="accent-forest-500" /> Planlı
                                </label>
                                <label className="flex items-center gap-1 cursor-pointer">
                                    <input type="radio" checked={state?.dutyType === DutyType.UNPLANNED} onChange={() => onChangeDetail(personId, 'dutyType', DutyType.UNPLANNED)} className="accent-forest-500" /> Plansız
                                </label>
                                
                                {isWeeklyMode && state?.dutyType !== DutyType.UNPLANNED && (
                                    <label className="flex items-center gap-1 cursor-pointer bg-forest-800 px-2 py-0.5 rounded border border-forest-600 ml-auto hover:bg-forest-700 transition-colors">
                                        <input 
                                            type="checkbox" 
                                            checked={!!state?.includeWeekend} 
                                            onChange={(e) => onChangeDetail(personId, 'includeWeekend', e.target.checked)} 
                                            className="accent-forest-500 w-4 h-4" 
                                        /> 
                                        <span className="text-white font-bold">Hafta sonu dahil</span>
                                    </label>
                                )}
                            </div>
                            <div className="flex items-center gap-2">
                                <Globe size={16} className="text-blue-400 flex-shrink-0" />
                                {state?.dutyType === DutyType.UNPLANNED ? (
                                    <input 
                                        type="text" 
                                        placeholder="Görev yerini manuel giriniz" 
                                        className="bg-forest-800 border border-forest-600 text-white text-xs rounded p-1.5 w-full focus:ring-blue-500 focus:border-blue-500" 
                                        value={state.dutyLocation || ''} 
                                        onChange={(e) => onChangeDetail(personId, 'dutyLocation', e.target.value)} 
                                    />
                                ) : (
                                    <select
                                        className="bg-forest-800 border border-forest-600 text-white text-xs rounded p-1.5 w-full focus:ring-blue-500 focus:border-blue-500"
                                        value={(!state?.dutyLocation) ? "" : ((state.dutyLocation === 'DİĞER' || state.dutyLocation === 'YURT DIŞI' || locations.includes(state.dutyLocation)) ? state.dutyLocation : 'DİĞER')}
                                        onChange={(e) => {
                                            const val = e.target.value;
                                            onChangeDetail(personId, 'dutyLocation', val);
                                        }}
                                    >
                                        <option value="" disabled>Görev Yeri Seç</option>
                                        {locations.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                )}
                            </div>
                            {state?.dutyType !== DutyType.UNPLANNED && (state?.dutyLocation === 'DİĞER' || state?.dutyLocation === 'YURT DIŞI' || (state?.dutyLocation && !locations.includes(state.dutyLocation))) && (
                                <input type="text" placeholder="Yer giriniz" className="bg-forest-800 border border-forest-600 text-white text-xs rounded p-1.5 w-full focus:ring-blue-500 focus:border-blue-500" value={(state.dutyLocation === 'DİĞER' || state.dutyLocation === 'YURT DIŞI') ? '' : state.dutyLocation} onChange={(e) => onChangeDetail(personId, 'dutyLocation', e.target.value)} />
                            )}
                        </div>
                    )}

                    {status === AttendanceStatus.COURSE && (
                        <div className="w-full flex flex-col gap-2 animate-fade-in bg-forest-900/50 p-2 rounded border border-indigo-500/30">
                            <div className="flex items-center gap-2 p-1">
                                <LucideIcons.BookOpen size={16} className="text-indigo-400 flex-shrink-0" />
                                <input 
                                    type="text" 
                                    placeholder="Kurs Adını Yazınız..." 
                                    className="bg-forest-800 border border-forest-600 text-white text-xs rounded p-1.5 w-full focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none" 
                                    value={state?.dutyLocation || ''} 
                                    onChange={(e) => onChangeDetail(personId, 'dutyLocation', e.target.value)} 
                                />
                            </div>
                        </div>
                    )}

                    {status === AttendanceStatus.LEAVE && (
                        <div className="w-full flex items-center gap-2 animate-fade-in bg-forest-900/50 p-2 rounded border border-yellow-500/30">
                            <Calendar size={16} className="text-yellow-400 flex-shrink-0" />
                            <select className="bg-forest-800 border border-forest-600 text-white text-xs rounded p-1.5 flex-grow focus:ring-yellow-500 focus:border-yellow-500" value={state?.leaveType || LeaveType.DAILY} onChange={(e) => onChangeDetail(personId, 'leaveType', e.target.value)}>
                                <option value={LeaveType.DAILY}>Günlük İzin (G.İ)</option>
                                <option value={LeaveType.OVERTIME}>Fazla Mesai İzni (F.M.İ)</option>
                                <option value={LeaveType.HALF_OVERTIME}>Yarım Gün F.M.İ (Y.F.M.İ)</option>
                                <option value={LeaveType.ANNUAL}>Yıllık İzin (Yİ)</option>
                                <option value={LeaveType.EXCUSE}>Mazeret İzni (M.İ)</option>
                                <option value={LeaveType.HALF_DAY}>Yarım Gün İzin (Y.G.İ)</option>
                            </select>
                            {isWeeklyMode && state?.leaveType === LeaveType.OVERTIME && (
                                <label className="flex-shrink-0 flex items-center gap-1 cursor-pointer bg-forest-800 px-2 py-0.5 rounded border border-forest-600 hover:bg-forest-700 transition-colors">
                                    <input 
                                        type="checkbox" 
                                        checked={!!state?.includeWeekend} 
                                        onChange={(e) => onChangeDetail(personId, 'includeWeekend', e.target.checked)} 
                                        className="accent-forest-500 w-4 h-4" 
                                    /> 
                                    <span className="text-white font-bold text-xs">H.Sonu</span>
                                </label>
                            )}
                        </div>
                    )}

                    {status === AttendanceStatus.OTHER && (
                        <div className="w-full flex items-center gap-2 animate-fade-in bg-forest-900/50 p-2 rounded border border-purple-500/30">
                            <MessageSquare size={16} className="text-purple-400 flex-shrink-0" />
                            <input type="text" placeholder="Açıklama giriniz..." className="bg-forest-800 border border-forest-600 text-white text-xs rounded p-1.5 w-full focus:ring-purple-500 focus:border-purple-500" value={state?.note || ''} onChange={(e) => onChangeDetail(personId, 'note', e.target.value)} />
                        </div>
                    )}
                </div>
            );
        };

        // AdminPanel Component
        const AdminPanel = ({ onLogout }) => {
            const [tab, setTab] = useState('aircraft');
            const [acList, setAcList] = useState([]);
            const [plList, setPlList] = useState([]);
            const [allAttendance, setAllAttendance] = useState([]);
            const [notification, setNotification] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isOrderChanged, setIsOrderChanged] = useState(false);
            
            // Harcırah State
            const [harcirahStep, setHarcirahStep] = useState('initial'); // 'initial', 'city_selected', 'unit_selected', 'range_selected'
            const [selectedHarcirahCity, setSelectedHarcirahCity] = useState('');
            const [selectedHarcirahUnit, setSelectedHarcirahUnit] = useState('');
            const [selectedHarcirahRange, setSelectedHarcirahRange] = useState(null); // { start: string, end: string }
            const [harcirahPersonnel, setHarcirahPersonnel] = useState([]);
            const [selectedHarcirahPersonnelIds, setSelectedHarcirahPersonnelIds] = useState(new Set());
            const [selectedHarcirahDates, setSelectedHarcirahDates] = useState({}); // { personId: Set<dateStr> }
            const [attendancePreviewModalOpen, setAttendancePreviewModalOpen] = useState(false);
            const [attendancePreviewData, setAttendancePreviewData] = useState({ range: null, records: [] });
            const [showFullAttendanceModal, setShowFullAttendanceModal] = useState(false);
            const [fullAttendanceParams, setFullAttendanceParams] = useState({ model: null, start: '', end: '', searchName: null });
            
            // 2️⃣ Excel Export İlerleme State'i
            const [exportProgress, setExportProgress] = useState(null);

            // Aircraft Form State
            const [acForm, setAcForm] = useState({ id: null, model: '', cat: AircraftCategory.HELICOPTER, tail: 'OR-', city: 'Ankara' });
            
            // Personnel Form State
            const [plForm, setPlForm] = useState({ id: null, name: '', role: Role.PILOT, city: 'Ankara', title: '', start: new Date().toLocaleDateString('en-CA'), unit: '', photoUrl: '', tcNo: '' });
            const [manualTitle, setManualTitle] = useState(false);

            // Modals
            const [deleteModalOpen, setDeleteModalOpen] = useState(false);
            const [personToDelete, setPersonToDelete] = useState(null);
            const [terminationDate, setTerminationDate] = useState('');
            const [photoModalOpen, setPhotoModalOpen] = useState(false);
            const [photoPerson, setPhotoPerson] = useState(null);
            const [zoomLevel, setZoomLevel] = useState(1);

            // 1️⃣ & 3️⃣ Excel/Sheet'ten Kopyala-Yapıştır & Sürükle-Bırak State'i
            const [tempPhotoData, setTempPhotoData] = useState(null);
            const imgRef = useRef(null);

            useEffect(() => {
                setLoading(true);
                Promise.all([
                    storageService.getAircraft().then(setAcList),
                    storageService.getPersonnel().then(p => setPlList(p.sort((a, b) => (a.rank || 999) - (b.rank || 999)))),
                    storageService.getAttendance().then(setAllAttendance)
                ]).finally(() => setLoading(false));
            }, []);

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            const handlePhotoAction = async (action, fileData = null) => {
                if (!photoPerson) return;
                setLoading(true);
                try {
                    const payload = { personId: photoPerson.id };
                    const finalFileData = fileData || tempPhotoData;

                    if (action === 'upload_photo' && finalFileData) {
                        payload.fileName = `${photoPerson.id}.jpg`;
                        payload.base64 = finalFileData.split(',')[1];
                    }

                    const result = await apiCall(action, payload);
                    const updatedUrl = action === 'delete_photo' ? '' : fixDriveUrl(result.url);
                    
                    // 3️⃣ Önbelleği senkronize et
                    if (action === 'upload_photo' && finalFileData) {
                        window.photoCache[photoPerson.id] = finalFileData;
                    }
                    if (action === 'delete_photo') {
                        delete window.photoCache[photoPerson.id];
                        const oldMatch = photoPerson.photoUrl.match(/[-\w]{25,}/);
                        if (oldMatch) delete window.photoCache[oldMatch[0]];
                    }

                    // Update state without refresh
                    const updatedList = plList.map(p => p.id === photoPerson.id ? { ...p, photoUrl: updatedUrl } : p);
                    setPlList(updatedList);
                    localStorage.setItem('ogm_personnel', JSON.stringify(updatedList));
                    
                    if (photoPerson) setPhotoPerson({ ...photoPerson, photoUrl: updatedUrl });
                    setTempPhotoData(null); // Önizlemeyi temizle
                    showNotify(action === 'delete_photo' ? "Fotoğraf silindi." : "Fotoğraf güncellendi.");
                } catch (e) {
                    alert("Fotoğraf işlemi hatası: " + e.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleUpdateDriveWithCrop = async () => {
                if (!photoPerson) return;
                
                // Get the current visible image source
                let sourceB64 = tempPhotoData;
                if (!sourceB64 && photoPerson.photoUrl) {
                    const fIdMatch = photoPerson.photoUrl.match(/[-\w]{25,}/);
                    if (fIdMatch) {
                        sourceB64 = window.photoCache[fIdMatch[0]] || await storageService.fetchSafeImage(fIdMatch[0]);
                    }
                }
                
                if (!sourceB64) return;

                // Create offscreen canvas to capture current "cropped" view (WYSIWYG)
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400;
                    canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    
                    // Mimic the container style (forest-950 bg)
                    ctx.fillStyle = '#0b2918';
                    ctx.fillRect(0, 0, 400, 400);

                    // Calculation for zoom/crop capture
                    const s = Math.min(img.width, img.height) / zoomLevel;
                    const dx = (img.width - s) / 2;
                    const dy = (img.height - s) / 2;
                    
                    ctx.drawImage(img, dx, dy, s, s, 0, 0, 400, 400);
                    const croppedB64 = canvas.toDataURL('image/jpeg', 0.9);
                    
                    // 1️⃣ KALICI GERÇEKLİK: RAM'deki önbelleği anında güncelle
                    window.photoCache[photoPerson.id] = croppedB64;
                    
                    // 2️⃣ DRIVE GÜNCELLE: Backend'e gönder
                    setLoading(true);
                    try {
                        const payload = { 
                          personId: photoPerson.id,
                          fileName: `${photoPerson.id}.jpg`,
                          base64: croppedB64.split(',')[1]
                        };
                        const result = await apiCall('upload_photo', payload);
                        const updatedUrl = fixDriveUrl(result.url);
                        
                        const updatedList = plList.map(p => p.id === photoPerson.id ? { ...p, photoUrl: updatedUrl } : p);
                        setPlList(updatedList);
                        localStorage.setItem('ogm_personnel', JSON.stringify(updatedList));
                        
                        setPhotoPerson({ ...photoPerson, photoUrl: updatedUrl });
                        setTempPhotoData(null);
                        setZoomLevel(1);
                        showNotify("Drive güncellendi ve yeni görünüm kalıcı hale getirildi.");
                    } catch (e) {
                        alert("Hata: " + e.message);
                    } finally {
                        setLoading(false);
                    }
                };
                img.src = sourceB64;
            };

            const processImageFile = (file) => {
                if (!file || !file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (event) => setTempPhotoData(event.target.result);
                reader.readAsDataURL(file);
            };

            const handleFileUpload = (e) => {
                processImageFile(e.target.files[0]);
            };

            // 1️⃣ Kopyala-Yapıştır Desteği
            const handlePaste = (e) => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        processImageFile(items[i].getAsFile());
                    }
                }
            };

            // 1️⃣ Sürükle-Bırak Desteği
            const handleDrop = (e) => {
                e.preventDefault();
                processImageFile(e.dataTransfer.files[0]);
            };

            const uniqueModels = useMemo(() => {
                const models = [...new Set(acList.map(a => a.model))].filter(m => m && m.length > 1);
                // Add YÖNETİM manually if not in list
                if (!models.includes('YÖNETİM')) models.push('YÖNETİM');
                return models.sort();
            }, [acList]);

            const saveAc = async () => {
                if (!acForm.model || !acForm.tail) return;
                setLoading(true);
                try {
                    let list = [...acList];
                    if (acForm.id) list = list.map(x => x.id === acForm.id ? { ...x, model: acForm.model, category: acForm.cat, tailNumber: acForm.tail, city: acForm.city } : x);
                    else list.push({ id: Date.now().toString(), model: acForm.model, category: acForm.cat, tailNumber: acForm.tail, city: acForm.city });
                    await storageService.saveAircraft(list);
                    setAcList(list);
                    setAcForm({ id: null, model: '', cat: AircraftCategory.HELICOPTER, tail: 'OR-', city: 'Ankara' });
                    showNotify("Hava aracı kaydedildi.");
                } finally {
                    setLoading(false);
                }
            };

            const deleteAc = async (id, e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const ac = acList.find(x => x.id === id);
                if (!ac) return;

                if (window.confirm(`${ac.tailNumber} kuyruk nolu ${ac.model} aracını silmek istediğinize emin misiniz?`)) {
                    setLoading(true);
                    try {
                        const list = acList.filter(x => x.id !== id);
                        await storageService.saveAircraft(list);
                        setAcList(list);
                        showNotify("Hava aracı silindi.");
                    } catch(e) {
                        console.error(e);
                        alert("Silme işlemi başarısız oldu.");
                    } finally {
                        setLoading(false);
                    }
                }
            };

            const savePl = async () => {
                if (!plForm.name) return;
                setLoading(true);
                try {
                    let list = [...plList];
                    const pData = { 
                        fullName: plForm.name, 
                        role: plForm.role, 
                        city: plForm.city, 
                        title: plForm.title, 
                        activeFrom: plForm.start, 
                        unit: plForm.unit, 
                        photoUrl: plForm.photoUrl, 
                        tcNo: plForm.tcNo,
                        'TC NO': plForm.tcNo // GS tarafındaki olası başlık eşleşmesi için
                    };
                    if (plForm.id) list = list.map(x => x.id === plForm.id ? { ...x, ...pData } : x);
                    else list.push({ id: Date.now().toString(), ...pData, rank: (Math.max(...list.map(x => x.rank || 0), 0) + 1) });
                    await storageService.savePersonnel(list);
                    setPlList(list);
                    setPlForm(prev => ({ ...prev, id: null, name: '', tcNo: '' }));
                    setManualTitle(false);
                    showNotify("Personel kaydedildi.");
                } finally {
                    setLoading(false);
                }
            };

            const initiateDeletePerson = (p) => {
                setPersonToDelete(p);
                setTerminationDate(new Date().toLocaleDateString('en-CA'));
                setDeleteModalOpen(true);
            };

            const terminatePerson = async () => {
                if (!personToDelete) return;
                setLoading(true);
                try {
                    const list = plList.map(p => p.id === personToDelete.id ? { ...p, activeUntil: terminationDate } : p);
                    await storageService.savePersonnel(list);
                    setPlList(list);
                    setDeleteModalOpen(false);
                    setPersonToDelete(null);
                    showNotify("Personel arşivlendi (İşten çıkarıldı).");
                } catch(e) {
                    console.error(e);
                    alert("İşlem başarısız oldu.");
                } finally {
                    setLoading(false);
                }
            };

            const hardDeletePerson = async () => {
                if (!personToDelete) return;
                if (window.confirm(`${personToDelete.fullName} isimli personelin kaydını TAMAMEN silmek üzeresiniz. Bu işlem geri alınamaz. Onaylıyor musunuz?`)) {
                    setLoading(true);
                    try {
                        const list = plList.filter(p => p.id !== personToDelete.id);
                        await storageService.savePersonnel(list);
                        setPlList(list);
                        setDeleteModalOpen(false);
                        setPersonToDelete(null);
                        showNotify("Personel kaydı tamamen silindi.");
                    } catch(e) {
                        console.error(e);
                        alert("Silme işlemi başarısız oldu.");
                    } finally {
                        setLoading(false);
                    }
                }
            };

            const movePl = (idx, dir) => {
                const list = [...plList];
                const tIdx = dir === 'up' ? idx - 1 : idx + 1;
                if (tIdx < 0 || tIdx >= list.length) return;
                
                [list[idx], list[tIdx]] = [list[tIdx], list[idx]];
                setPlList(list);
                setIsOrderChanged(true);
            };

            const saveOrder = async () => {
                setLoading(true);
                try {
                    const updatedList = plList.map((p, i) => ({ ...p, rank: i + 1 }));
                    await storageService.savePersonnel(updatedList);
                    setPlList(updatedList);
                    setIsOrderChanged(false);
                    showNotify("Sıralama kaydedildi.");
                } catch (e) {
                    alert("Sıralama kaydedilemedi: " + e.message);
                } finally {
                    setLoading(false);
                }
            };

            // --- Harcırah Logic ---
            const availableHarcirahCities = useMemo(() => {
                const cities = new Set();
                allAttendance.forEach(r => {
                    if (r.status === AttendanceStatus.DUTY && r.dutyLocation?.trim()) {
                        cities.add(r.dutyLocation.trim().toLocaleUpperCase('tr-TR'));
                    }
                });
                return Array.from(cities).sort();
            }, [allAttendance]);

            const getHarcirahCategory = (p) => {
                const title = (p.title || '').toLocaleUpperCase('tr-TR');
                
                if (title.includes('AT-802')) return 'AT-802';
                if (title.includes('T-70')) return 'T-70';
                if (title.includes('C-650')) return 'C-650';
                if (title.includes('B-360')) return 'B-360';
                if (title.includes('BELL-429')) return 'BELL-429';
                
                return 'İDARİ BİRİM';
            };

            const handleHarcirahCitySelect = (city) => {
                setSelectedHarcirahCity(city);
                setSelectedHarcirahUnit('');
                setSelectedHarcirahRange(null);
                setHarcirahPersonnel([]);
                setSelectedHarcirahPersonnelIds(new Set());
                setHarcirahStep('city_selected');
            };

            const handleHarcirahUnitSelect = (unitCat) => {
                setSelectedHarcirahUnit(unitCat);
                setSelectedHarcirahRange(null);
                setHarcirahPersonnel([]);
                setSelectedHarcirahPersonnelIds(new Set());
                setHarcirahStep('unit_selected');
            };

            const availableHarcirahRanges = useMemo(() => {
                if (!selectedHarcirahCity || !selectedHarcirahUnit) return [];
                
                const unitPersonIds = new Set(plList.filter(p => getHarcirahCategory(p) === selectedHarcirahUnit).map(p => p.id));
                
                // Get ALL duty dates for this unit
                const allUnitDutyRecs = allAttendance.filter(r => 
                    unitPersonIds.has(r.personId) && 
                    r.status === AttendanceStatus.DUTY
                ).sort((a, b) => a.date.localeCompare(b.date));

                if (allUnitDutyRecs.length === 0) return [];

                const allDates = [...new Set(allUnitDutyRecs.map(r => r.date))].sort();
                
                const ranges = [];
                if (allDates.length > 0) {
                    let start = allDates[0];
                    let prev = allDates[0];
                    
                    // Helper to check if a date has any record with a DIFFERENT city for this unit
                    const getCityForDate = (dateStr) => {
                        const recs = allUnitDutyRecs.filter(r => r.date === dateStr && r.dutyLocation?.trim());
                        if (recs.length === 0) return null;
                        // If multiple cities on same day (unlikely but possible), prioritize selected city
                        const hasSelected = recs.some(r => r.dutyLocation.trim().toLocaleUpperCase('tr-TR') === selectedHarcirahCity);
                        if (hasSelected) return selectedHarcirahCity;
                        return recs[0].dutyLocation.trim().toLocaleUpperCase('tr-TR');
                    };

                    let currentRangeHasSelectedCity = getCityForDate(start) === selectedHarcirahCity;

                    for (let i = 1; i <= allDates.length; i++) {
                        const current = allDates[i];
                        let shouldBreak = false;
                        let diff = 0;

                        if (current) {
                            const d1 = new Date(prev); d1.setHours(12,0,0,0);
                            const d2 = new Date(current); d2.setHours(12,0,0,0);
                            diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
                            
                            if (diff > 3) {
                                shouldBreak = true;
                            } else {
                                // Check if city changed to something else
                                const prevCity = getCityForDate(prev);
                                const currCity = getCityForDate(current);
                                if (prevCity && currCity && prevCity !== currCity) {
                                    shouldBreak = true;
                                }
                            }
                        } else {
                            shouldBreak = true;
                        }
                        
                        if (shouldBreak) {
                            if (currentRangeHasSelectedCity) {
                                ranges.push({ start, end: prev });
                            }
                            if (current) {
                                start = current;
                                currentRangeHasSelectedCity = getCityForDate(start) === selectedHarcirahCity;
                            }
                        } else {
                            if (getCityForDate(current) === selectedHarcirahCity) {
                                currentRangeHasSelectedCity = true;
                            }
                        }
                        prev = current;
                    }
                }
                return ranges;
            }, [selectedHarcirahCity, selectedHarcirahUnit, allAttendance, plList]);

            const toggleHarcirahDate = (personId, dateStr) => {
                setSelectedHarcirahDates(prev => {
                    const next = { ...prev };
                    const dates = new Set(next[personId] || []);
                    if (dates.has(dateStr)) dates.delete(dateStr);
                    else dates.add(dateStr);
                    next[personId] = dates;
                    return next;
                });
            };

            const handleHarcirahRangeSelect = (range) => {
                setSelectedHarcirahRange(range);
                
                const unitPersonIds = new Set(plList.filter(p => getHarcirahCategory(p) === selectedHarcirahUnit).map(p => p.id));
                
                // Find personnel who were in this city during this range
                const personIdsInRange = new Set(
                    allAttendance
                        .filter(r => 
                            unitPersonIds.has(r.personId) &&
                            r.status === AttendanceStatus.DUTY && 
                            r.date >= range.start &&
                            r.date <= range.end
                        )
                        .map(r => r.personId)
                );

                const eligible = plList.filter(p => personIdsInRange.has(p.id) && getHarcirahCategory(p) === selectedHarcirahUnit);
                setHarcirahPersonnel(eligible);
                
                // Initialize selected dates for each person
                const initialDates = {};
                eligible.forEach(p => {
                    const dates = new Set(
                        allAttendance
                            .filter(r => 
                                r.personId === p.id && 
                                r.status === AttendanceStatus.DUTY && 
                                r.date >= range.start && 
                                r.date <= range.end
                            )
                            .map(r => r.date)
                    );
                    initialDates[p.id] = dates;
                });
                setSelectedHarcirahDates(initialDates);
                setSelectedHarcirahPersonnelIds(new Set(eligible.map(p => p.id))); // Auto-select all eligible by default
                
                setHarcirahStep('range_selected');
            };

            const toggleHarcirahPerson = (id) => {
                const next = new Set(selectedHarcirahPersonnelIds);
                if (next.has(id)) next.delete(id);
                else next.add(id);
                setSelectedHarcirahPersonnelIds(next);
            };

            const addAllHarcirahPersonnel = () => {
                setSelectedHarcirahPersonnelIds(new Set(harcirahPersonnel.map(p => p.id)));
            };

            const exportHarcirahExcel = async () => {
                if (selectedHarcirahPersonnelIds.size === 0) return;
                setLoading(true);
                try {
                    const workbook = new ExcelJS.Workbook();
                    const worksheet = workbook.addWorksheet('Harcırah Listesi');

                    const currentYear = selectedHarcirahRange ? new Date(selectedHarcirahRange.start).getFullYear() : new Date().getFullYear();

                    // Header
                    worksheet.mergeCells('A1:H1');
                    worksheet.getCell('A1').value = `${currentYear} YILI HARCIRAH GÖREV LİSTESİ`;
                    worksheet.getCell('A1').font = { bold: true, size: 14 };
                    worksheet.getCell('A1').alignment = { horizontal: 'center' };

                    // Table Headers
                    const headers = ['SIRA', 'AD SOYAD', 'TC NO', 'UNVAN', 'GÖREV YERİ', 'BAŞLANGIÇ', 'BİTİŞ', 'GÜN'];
                    worksheet.getRow(3).values = headers;
                    worksheet.getRow(3).font = { bold: true };
                    worksheet.getRow(3).eachCell(cell => {
                        cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9D9D9' } };
                        cell.alignment = { horizontal: 'center' };
                    });

                    const selectedPeople = harcirahPersonnel.filter(p => selectedHarcirahPersonnelIds.has(p.id));
                    
                    selectedPeople.forEach((p, idx) => {
                        const rowIndex = idx + 4;
                        
                        const selectedDatesForPerson = Array.from(selectedHarcirahDates[p.id] || []).sort();
                        
                        if (selectedDatesForPerson.length > 0) {
                            const firstDateStr = selectedDatesForPerson[0];
                            const lastDateStr = selectedDatesForPerson[selectedDatesForPerson.length - 1];
                            
                            const d1 = new Date(firstDateStr); d1.setHours(12,0,0,0);
                            const d2 = new Date(lastDateStr); d2.setHours(12,0,0,0);
                            
                            const countDays = selectedDatesForPerson.length;
                            let hStart, hEnd, diffDays;
                            
                            if (countDays >= 7) {
                                hStart = new Date(d1); hStart.setDate(hStart.getDate() + 1);
                                hEnd = new Date(d2);
                                diffDays = countDays - 1;
                            } else {
                                hStart = new Date(d1);
                                hEnd = new Date(d2);
                                diffDays = countDays;
                            }

                            let displayTitle = getDisplayTitle(p.title, p.role);
                            if (displayTitle.toLocaleUpperCase('tr-TR').includes('PİLOT')) {
                                displayTitle = 'Pilot';
                            }

                            const rowData = [
                                idx + 1,
                                p.fullName,
                                p.tcNo || '',
                                displayTitle,
                                selectedHarcirahCity,
                                hStart.toLocaleDateString('tr-TR'),
                                hEnd.toLocaleDateString('tr-TR'),
                                diffDays
                            ];
                            
                            worksheet.getRow(rowIndex).values = rowData;
                            worksheet.getRow(rowIndex).eachCell(cell => {
                                cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
                                cell.alignment = { horizontal: 'center' };
                            });
                        }
                    });

                    // Signature Block (Rank 1 - Murat Akmeşe Logic)
                    const rank1Person = plList.find(p => p.rank === 1) || { fullName: 'Cengiz ÖZDEMİR', title: 'Kaptan Pilot' };
                    
                    // Merge and center F, G columns, rows 8, 9, 10, 11
                    worksheet.mergeCells('F8:G11');
                    const sigCell = worksheet.getCell('F8');
                    sigCell.value = `${rank1Person.fullName}\nKaptan Pilot\nUçuş ve Eğitim Şube Müdürü`;
                    sigCell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                    sigCell.font = { bold: true };

                    worksheet.columns = [
                        { width: 8 }, { width: 30 }, { width: 20 }, { width: 25 }, { width: 20 }, { width: 18 }, { width: 18 }, { width: 10 }
                    ];

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `Harcirah_${selectedHarcirahCity}_${selectedHarcirahUnit}_${currentYear}.xlsx`;
                    link.click();
                } catch (e) {
                    alert("Excel hatası: " + e.message);
                } finally {
                    setLoading(false);
                }
            };

            const exportPersonnelCsv = () => {
                let csv = '\uFEFFSIRA;AD SOYAD;TC NO;UNVAN;BİRİM;BÖLGE\n';
                plList.forEach((p, i) => {
                    csv += `${i + 1};"${p.fullName}";"${p.tcNo || ''}";"${getDisplayTitle(p.title, p.role)}";"${p.unit || ''}";"${p.city}"\n`;
                });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
                link.download = 'Personel_Listesi.csv';
                link.click();
            };

            // 3️⃣ & 4️⃣ Resimli Excel Raporu (Gördüğünü Al WYSIWYG Flow)
            const exportPersonnelExcel = async () => {
                const activePersonnel = plList.filter(p => !p.activeUntil);
                if (activePersonnel.length === 0) return;

                setExportProgress(1); // 4️⃣ Progress Start
                
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('Personel Listesi');
                
                // 5️⃣ & 6️⃣ Excel Tablo Stili ve Başlık Satırı
                worksheet.columns = [
                    { header: 'SIRA NO', key: 'sira', width: 10 },
                    { header: 'AD SOYADI', key: 'ad', width: 35 },
                    { header: 'TC NO', key: 'tc', width: 20 },
                    { header: 'BİRİMİ', key: 'birim', width: 25 },
                    { header: 'FOTOĞRAF', key: 'foto', width: 15 }
                ];

                worksheet.getRow(1).font = { color: { argb: 'FFFFFFFF' }, bold: true };
                worksheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF228B22' } };
                worksheet.getRow(1).alignment = { vertical: 'middle', horizontal: 'center' };

                let preparedCount = 0;
                const offscreenCanvas = document.createElement('canvas');
                offscreenCanvas.width = 60;
                offscreenCanvas.height = 60;
                const ctx = offscreenCanvas.getContext('2d');

                for (let i = 0; i < activePersonnel.length; i++) {
                    const p = activePersonnel[i];
                    const rowIndex = i + 2;
                    worksheet.getRow(rowIndex).height = 55;
                    worksheet.getCell(`A${rowIndex}`).value = i + 1;
                    worksheet.getCell(`B${rowIndex}`).value = p.fullName;
                    worksheet.getCell(`C${rowIndex}`).value = p.tcNo || '';
                    worksheet.getCell(`D${rowIndex}`).value = p.unit || getDisplayTitle(p.title, p.role);
                    
                    // GÖRSEL KAYNAK: Kalıcı gerçeklik olan RAM önbelleğini esas al (WYSIWYG)
                    let sourceB64 = window.photoCache[p.id];
                    if (!sourceB64 && p.photoUrl) {
                        const fIdMatch = p.photoUrl.match(/[-\w]{25,}/);
                        if (fIdMatch) sourceB64 = await storageService.fetchSafeImage(fIdMatch[0]);
                    }

                    if (sourceB64) {
                        try {
                            const imgB64 = await new Promise((resolve) => {
                                const img = new Image();
                                img.onload = () => {
                                    ctx.fillStyle = '#0b2918'; 
                                    ctx.fillRect(0, 0, 60, 60);
                                    const s = Math.min(img.width, img.height);
                                    ctx.drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, 60, 60);
                                    resolve(offscreenCanvas.toDataURL('image/jpeg', 0.8));
                                };
                                img.onerror = () => resolve(null);
                                img.src = sourceB64;
                            });

                            if (imgB64) {
                                const imageId = workbook.addImage({
                                    base64: imgB64,
                                    extension: 'jpeg',
                                });
                                worksheet.addImage(imageId, {
                                    tl: { col: 4.1, row: i + 1.1 },
                                    ext: { width: 60, height: 60 }
                                });
                            }
                        } catch(e) { console.error("Image error", e); }
                    }

                    preparedCount++;
                    setExportProgress((preparedCount / activePersonnel.length) * 100);
                    if (preparedCount % 5 === 0) await new Promise(r => setTimeout(r, 10));
                }

                worksheet.eachRow((row) => {
                    row.eachCell((cell) => {
                        cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
                        cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    });
                });

                if (preparedCount === activePersonnel.length) {
                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `Resimli_Personel_Listesi_${new Date().toLocaleDateString('tr-TR')}.xlsx`;
                    link.click();
                    setTimeout(() => setExportProgress(null), 800);
                }
            };

            if (loading) return (
                <div className="fixed inset-0 bg-black/80 z-50 flex flex-col items-center justify-center">
                    <div className="w-64 h-64 mb-4 rounded-full border-8 border-forest-400 overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.6)]">
                        <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNW9uenhqZXdxbGd6YWNxc2UwempmOXNyaG15NGtuZTJmb3EyaTNqZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/1rrxPs1nb3IjwmbiXw/giphy.gif" alt="Loading..." className="w-full h-full object-cover" />
                    </div>
                    <div className="text-white text-xl font-bold animate-pulse">Bekleyiniz</div>
                </div>
            );

            return (
                <div className="container mx-auto p-4 max-w-6xl relative">
                    {/* 4️⃣ Progress Bar Modal (Zorunlu) */}
                    {exportProgress !== null && (
                        <div className="fixed inset-0 bg-black/70 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-forest-900 border border-forest-500 p-8 rounded-2xl max-w-sm w-full shadow-2xl text-center animate-slide-down">
                                <div className="text-white font-bold mb-4 text-lg uppercase tracking-widest">Rapor Hazırlanıyor</div>
                                <div className="w-full bg-forest-950 rounded-full h-6 mb-3 border border-forest-700 overflow-hidden p-1 shadow-inner">
                                    <div className="bg-gradient-to-r from-green-600 via-green-400 to-green-500 h-full rounded-full transition-all duration-300" style={{ width: `${exportProgress}%` }}></div>
                                </div>
                                <div className="text-green-400 text-sm font-bold font-mono">%{Math.round(exportProgress)} Tamamlandı</div>
                                <p className="text-forest-400 text-[11px] mt-4 leading-tight">Fotoğraflar frontend RAM önbellekten yakalanarak Excel dosyasına embedded image olarak gömülüyor.</p>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="absolute top-0 right-0 m-4 bg-green-600 text-white px-4 py-2 rounded shadow-lg animate-slide-down z-50 flex items-center">
                            <CheckCircle size={18} className="mr-2" /> {notification}
                        </div>
                    )}
                    <div className="flex justify-between mb-6">
                        <h2 className="text-2xl font-bold">Yönetici Paneli</h2>
                        <div className="flex gap-2">
                             {isOrderChanged && (
                                 <button onClick={saveOrder} className="bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 text-sm rounded-md font-bold shadow-lg animate-pulse flex items-center gap-2">
                                     <LucideIcons.Save size={16} /> Sıralamayı Kaydet
                                 </button>
                             )}
                             {/* WEB GÖRÜNÜMÜ BİREBİR Excel Butonu */}
                             <button onClick={exportPersonnelExcel} className="btn-excel flex items-center gap-2 px-4 py-2 text-sm rounded-md font-bold shadow-md transition-all">
                                <FileText size={16} /> Personel Listesi Excel (Resimli)
                             </button>
                             <Button variant="secondary" onClick={onLogout}>
                                <LogOut className="mr-2" size={16} /> Çıkış
                             </Button>
                        </div>
                    </div>
                    <div className="flex gap-2 mb-6 border-b border-forest-600 pb-2">
                        <button onClick={() => setTab('aircraft')} className={`px-4 py-2 rounded ${tab === 'aircraft' ? 'bg-forest-600 text-white' : 'text-forest-300'}`}>Hava Araçları</button>
                        <button onClick={() => setTab('personnel')} className={`px-4 py-2 rounded ${tab === 'personnel' ? 'bg-forest-600 text-white' : 'text-forest-300'}`}>Personel</button>
                        <button onClick={() => setTab('harcirah')} className={`px-4 py-2 rounded ${tab === 'harcirah' ? 'bg-forest-600 text-white' : 'text-forest-300'}`}>Harcırah</button>
                    </div>

                    {tab === 'aircraft' ? (
                        <div className="grid lg:grid-cols-3 gap-6">
                            <Card title={acForm.id ? "Düzenle" : "Ekle"} className="h-fit">
                                <div className="space-y-3">
                                    <input placeholder="Ad (Örn: BELL-429)" className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={acForm.model} onChange={e => setAcForm({ ...acForm, model: e.target.value })} />
                                    <div className="flex gap-1">
                                        <button onClick={() => setAcForm({ ...acForm, cat: AircraftCategory.HELICOPTER })} className={`flex-1 py-1 text-xs border ${acForm.cat === AircraftCategory.HELICOPTER ? 'bg-forest-500' : 'bg-forest-800'}`}>Helikopter</button>
                                        <button onClick={() => setAcForm({ ...acForm, cat: AircraftCategory.PLANE })} className={`flex-1 py-1 text-xs border ${acForm.cat === AircraftCategory.PLANE ? 'bg-forest-500' : 'bg-forest-800'}`}>Uçak</button>
                                    </div>
                                    <input placeholder="Kuyruk No" className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={acForm.tail} onChange={e => setAcForm({ ...acForm, tail: e.target.value })} />
                                    <select className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={acForm.city} onChange={e => setAcForm({ ...acForm, city: e.target.value })}>{CITIES.map(c => <option key={c}>{c}</option>)}</select>
                                    <div className="flex gap-2">
                                        <Button onClick={saveAc} className="flex-1">{acForm.id ? 'Güncelle' : 'Ekle'}</Button>
                                        {acForm.id && <Button variant="secondary" onClick={() => { setAcForm({ id: null, model: '', cat: AircraftCategory.HELICOPTER, tail: 'OR-', city: 'Ankara' }); }}>İptal</Button>}
                                    </div>
                                </div>
                            </Card>
                            <Card title="Filo Listesi" className="lg:col-span-2">
                                <div className="overflow-auto max-h-[600px]">
                                    <table className="w-full text-sm text-forest-200">
                                        <thead><tr className="text-left"><th className="p-2">Model</th><th className="p-2">Kuyruk</th><th className="p-2">Bölge</th><th className="p-2 text-right">İşlem</th></tr></thead>
                                        <tbody>
                                            {acList.map(a => (
                                                <tr key={a.id} className="border-b border-forest-700 hover:bg-forest-700/50 cursor-pointer" onDoubleClick={() => { setAcForm({ id: a.id, model: a.model, cat: a.category, tail: a.tailNumber, city: a.city }); }}>
                                                    <td className="p-2">{a.model}</td>
                                                    <td className="p-2">{a.tailNumber}</td>
                                                    <td className="p-2">{a.city}</td>
                                                    <td className="p-2 text-right">
                                                        <button onClick={(e) => deleteAc(a.id, e)} type="button" className="text-red-400 hover:text-red-300 p-2 relative z-10"><Trash2 size={16} /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    ) : tab === 'personnel' ? (
                        <div className="grid lg:grid-cols-3 gap-6">
                            <Card title={plForm.id ? "Düzenle" : "Ekle"} className="h-fit">
                                <div className="space-y-3">
                                    <input placeholder="Ad Soyad" className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={plForm.name} onChange={e => setPlForm({ ...plForm, name: e.target.value })} />
                                    <input placeholder="TC NO" className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={plForm.tcNo} onChange={e => setPlForm({ ...plForm, tcNo: e.target.value })} maxLength={11} />
                                    <select 
                                        className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" 
                                        value={manualTitle ? 'OTHER' : (plForm.title || '')} 
                                        onChange={e => {
                                            const val = e.target.value;
                                            let newRole = plForm.role;
                                            const valUpper = val.toLocaleUpperCase('tr-TR');
                                            if (valUpper.includes('PİLOT')) newRole = Role.PILOT;
                                            else if (valUpper.includes('TEKNİSYEN') || valUpper.includes('TEKNİKER') || valUpper.includes('MÜHENDİS')) newRole = Role.TECHNICIAN;
                                            if (val === 'OTHER') { 
                                                setManualTitle(true); 
                                                setPlForm({ ...plForm, title: '', role: newRole });
                                            } else { 
                                                setManualTitle(false); 
                                                setPlForm({ ...plForm, title: val, role: newRole });
                                            }
                                        }}
                                    >
                                        <option value="">Unvan Seç</option>
                                        {PERSONNEL_TITLES.map(t => <option key={t} value={t}>{t}</option>)}
                                        <option value="OTHER">Diğer</option>
                                    </select>
                                    {manualTitle && <input placeholder="Unvan Giriniz" className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={plForm.title} onChange={e => setPlForm({ ...plForm, title: e.target.value })} />}
                                    <select className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={plForm.unit || ''} onChange={e => setPlForm({ ...plForm, unit: e.target.value })}>
                                        <option value="">Birim / Uçak Seçimi</option>
                                        {uniqueModels.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <select className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={plForm.city} onChange={e => setPlForm({ ...plForm, city: e.target.value })}>{CITIES.map(c => <option key={c}>{c}</option>)}</select>
                                    <input type="date" className="w-full bg-forest-950 border border-forest-700 rounded p-2 text-white" value={plForm.start} onChange={e => setPlForm({ ...plForm, start: e.target.value })} />
                                    <div className="flex gap-2">
                                        <Button onClick={savePl} className="flex-1">{plForm.id ? 'Güncelle' : 'Ekle'}</Button>
                                        {plForm.id && <Button variant="secondary" onClick={() => { setPlForm({ id: null, name: '', role: Role.PILOT, city: 'Ankara', title: '', start: new Date().toLocaleDateString('en-CA'), unit: '', photoUrl: '', tcNo: '' }); setManualTitle(false); }}>İptal</Button>}
                                    </div>
                                </div>
                            </Card>
                            <Card title="Personel Listesi (Fotoğraf İçin İsme Çift Tıklayınız)" className="lg:col-span-2">
                                 <div className="flex justify-end gap-2 mb-2">
                                     <Button onClick={exportPersonnelCsv} size="sm" variant="secondary" className="flex items-center gap-2">CSV İndir</Button>
                                 </div>
                                <div className="overflow-auto max-h-[600px]">
                                    <table className="w-full text-sm text-forest-200">
                                        <thead><tr className="text-left"><th className="p-2">Sıra</th><th className="p-2">Ad Soyad</th><th className="p-2">TC NO</th><th className="p-2">Unvan</th><th className="p-2">Birim</th><th className="p-2 text-right">İşlem</th></tr></thead>
                                        <tbody>
                                            {plList.map((p, i) => (
                                                <tr 
                                                    key={p.id} 
                                                    className={`border-b border-forest-700 hover:bg-forest-700/50 cursor-pointer ${p.activeUntil ? 'opacity-50' : ''}`} 
                                                    onClick={() => { 
                                                        setPlForm({ 
                                                            id: p.id, 
                                                            name: p.fullName, 
                                                            role: p.role, 
                                                            city: p.city, 
                                                            title: p.title, 
                                                            start: p.activeFrom || DEFAULT_START_DATE, 
                                                            unit: p.unit || '', 
                                                            photoUrl: p.photoUrl || '', 
                                                            tcNo: p.tcNo || '' 
                                                        }); 
                                                        setManualTitle(!PERSONNEL_TITLES.includes(p.title) && p.title !== ''); 
                                                    }}
                                                    onDoubleClick={() => { 
                                                        setPhotoPerson(p); 
                                                        setPhotoModalOpen(true); 
                                                        setTempPhotoData(null); 
                                                        setZoomLevel(1); 
                                                    }}
                                                >
                                                    <td className="p-2">{i + 1}</td>
                                                    <td className="p-2 flex items-center gap-2">
                                                        {p.fullName} 
                                                        {(p.photoUrl || window.photoCache[p.id]) && <ImageIcon size={14} className="text-forest-400" />}
                                                    </td>
                                                    <td className="p-2">{p.tcNo || '-'}</td>
                                                    <td className="p-2 bg-forest-900/50"><span className="text-xs px-1 rounded bg-forest-800">{getDisplayTitle(p.title, p.role)}</span></td>
                                                    <td className="p-2">{p.unit || '-'}</td>
                                                    <td className="p-2 text-right flex justify-end gap-1">
                                                        <button 
                                                            onClick={(e) => { 
                                                                e.stopPropagation(); 
                                                                setFullAttendanceParams({ 
                                                                    model: null, 
                                                                    start: getTodayString(), 
                                                                    end: getTodayString(), 
                                                                    searchName: p.fullName 
                                                                });
                                                                setShowFullAttendanceModal(true);
                                                            }} 
                                                            title="Yoklamada Göster"
                                                            className="text-forest-400 hover:text-white p-1"
                                                        >
                                                            <Calendar size={16} />
                                                        </button>
                                                        <button onClick={(e) => { e.stopPropagation(); movePl(i, 'up') }}><ArrowUp size={14} /></button>
                                                        <button onClick={(e) => { e.stopPropagation(); movePl(i, 'down') }}><ArrowDown size={14} /></button>
